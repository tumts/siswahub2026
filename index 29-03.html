<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SiswaHub Pro 2026</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-font-smoothing: antialiased; background-color: #f8fafc; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fadeIn { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
    .animate-slideUp { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-20px) translateX(-50%); } to { opacity: 1; transform: translateY(0) translateX(-50%); } }
    .animate-slideDown { animation: slideDown 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    .animate-slideInRight { animation: slideInRight 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .line-clamp-1 { display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect, useRef } = React;

    // --- SVG ICONS COMPONENT ---
    const Icons = {
      Lock: ({ size = 18 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>,
      Unlock: ({ size = 18 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg>,
      Check: ({ size = 16 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
      CheckCircle: ({ size = 24 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>,
      Search: ({ size = 20 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>,
      ArrowLeft: ({ size = 20 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>,
      ArrowRight: ({ size = 20 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>,
      Refresh: ({ size = 18 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/></svg>,
      Eye: ({ size = 18 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>,
      EyeOff: ({ size = 18 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" y1="2" x2="22" y2="22"/></svg>,
      Copy: ({ size = 18 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>,
      Trash: ({ size = 14 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18m-2 0v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6m3 0V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>,
      Plus: ({ size = 16 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M12 5v14m-7-7h14"/></svg>,
      Image: ({ size = 16 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>,
      FileText: ({ size = 16 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>,
      Edit: ({ size = 18 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg>,
      LogOut: ({ size = 18 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>,
      Upload: ({ size = 24 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>,
      ChevronLeft: ({ size = 20 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>,
      ChevronDown: ({ size = 20 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"/></svg>,
      X: ({ size = 20 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
      Filter: ({ size = 16 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>,
      AlertTriangle: ({ size = 24 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>,
      Settings: ({ size = 32 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>,
      ShieldCheck: ({ size = 32 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/><path d="m9 12 2 2 4-4"/></svg>,
      BookOpen: ({ size = 18 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>,
      User: ({ size = 18 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
      HelpCircle: ({ size = 14 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>,
      Phone: ({ size = 20 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>,
      Bell: ({ size = 16 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>,
      PlayCircle: ({ size = 20 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg>,
      Printer: ({ size = 16 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect width="12" height="8" x="6" y="14"/></svg>,
      Download: ({ size = 16 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>,
      Database: ({ size = 20 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>,
      ClipboardEdit: ({ size = 20 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect width="8" height="4" x="8" y="2" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M10.42 12.61a2.1 2.1 0 1 1 2.97 2.97L7.95 21 4 22l.99-3.95 5.43-5.44Z"/></svg>,
      MessageCircle: ({ size = 20 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>,
      Rotate: ({ size = 18 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>
    };

    // --- UTILS ---
    const normalizeId = (id) => String(id || '').trim().replace(/^0+/, '');

    const calculateProgress = (data) => {
      const baseFields = ['wa_siswa', 'email_siswa', 'status_ayah', 'status_ibu', 'link_kartukeluarga', 'link_ijazah'];
      let filled = baseFields.filter(f => data[f] && String(data[f]).trim() !== '').length;
      let total = baseFields.length + 2; 
      
      if (data.status_ayah && data.status_ayah !== 'Masih Hidup') filled++;
      else if (data.nama_ayah && String(data.nama_ayah).trim() !== '') filled++;

      if (data.status_ibu && data.status_ibu !== 'Masih Hidup') filled++;
      else if (data.nama_ibu && String(data.nama_ibu).trim() !== '') filled++;

      return Math.round((filled / total) * 100);
    };

    // --- REUSABLE COMPONENTS ---
    const CircularProgress = ({ percentage, size = 36, strokeWidth = 3 }) => {
      const radius = (size - strokeWidth) / 2;
      const circumference = radius * 2 * Math.PI;
      const offset = circumference - (percentage / 100) * circumference;
      let colorClass = percentage >= 100 ? "text-green-500" : percentage >= 50 ? "text-blue-500" : percentage > 0 ? "text-amber-500" : "text-red-500";
      return (
        <div className="relative flex items-center justify-center" style={{ width: size, height: size }}>
          <svg className="transform -rotate-90" width={size} height={size}>
            <circle cx={size/2} cy={size/2} r={radius} stroke="currentColor" strokeWidth={strokeWidth} fill="transparent" className="text-gray-100" />
            <circle cx={size/2} cy={size/2} r={radius} stroke="currentColor" strokeWidth={strokeWidth} fill="transparent" strokeDasharray={circumference} strokeDashoffset={offset} className={`${colorClass} transition-all duration-1000 ease-out`} strokeLinecap="round" />
          </svg>
          <span className="absolute text-[8px] font-black text-gray-700">{percentage}%</span>
        </div>
      );
    };

    const InputField = ({ label, name, type="text", options, placeholder, formData, setFormData, required, isWA }) => {
      const handleChange = (e) => {
          let val = e.target.value;
          if (isWA) {
              val = val.replace(/\D/g, ''); 
              if (val.startsWith('0')) val = '62' + val.substring(1); 
              else if (val.length > 0 && val.startsWith('8')) val = '62' + val; 
          }
          setFormData({...formData, [name]: val});
      };
      return (
          <div className="mb-4">
              <label className="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1 block">{label} {required && <span className="text-red-500 ml-1">*</span>}</label>
              {type === 'select' ? (
                  <select value={formData[name]||''} onChange={handleChange} className="w-full p-3 bg-gray-50 border rounded-xl font-bold text-sm outline-none focus:border-blue-500 transition-colors"><option value="">Pilih...</option>{options?.map(o=><option key={o} value={o}>{o}</option>)}</select>
              ) : (
                  <input type={type} placeholder={placeholder} value={formData[name]||''} onChange={handleChange} className="w-full p-3 bg-gray-50 border rounded-xl font-bold text-sm outline-none focus:border-blue-500 transition-colors" />
              )}
          </div>
      );
    };

    const ProfileComponent = ({ data, onOpenGallery, onBack, role, onVerify, onReject, onDeleteFile }) => {
        const [rejectMode, setRejectMode] = useState(false);
        const [rejectNote, setRejectNote] = useState(data.catatan_perbaikan || '');
        const quickTemplates = ["Foto KK buram / terpotong.", "Foto Ijazah tidak terbaca.", "Dokumen yang diunggah salah.", "Nama tidak sesuai dengan Ijazah."];
        const handleTemplateClick = (text) => setRejectNote(prev => prev ? `${prev} ${text}` : text);
        useEffect(() => { setRejectNote(data.catatan_perbaikan || ''); setRejectMode(false); }, [data]);

        return (
          <div className="bg-white rounded-[2rem] p-6 border border-gray-100 shadow-sm space-y-6">
              {onBack && <button onClick={onBack} className="mb-2 text-gray-400 flex items-center gap-2 font-bold text-xs uppercase tracking-widest hover:text-gray-600 transition-colors"><Icons.ArrowLeft /> Kembali</button>}
              
              <div className="text-center pt-2 pb-4">
                  <h3 className="text-2xl font-black text-gray-900 leading-tight mb-1">{data.nama}</h3>
                  <p className="text-[11px] text-gray-500 font-bold">{data.nisn} • Kelas {data.kelas}-{data.rombel}</p>
              </div>

              {data.status_verifikasi === 'Perbaikan' && data.catatan_perbaikan && (
                  <div className="bg-red-50 border border-red-100 p-4 rounded-2xl animate-fadeIn">
                      <p className="text-[10px] font-black text-red-600 uppercase mb-2 flex items-center gap-1"><Icons.AlertTriangle/> Catatan Perbaikan</p>
                      <p className="text-xs font-medium text-red-800 leading-relaxed">{data.catatan_perbaikan}</p>
                  </div>
              )}

              {data.status_verifikasi === 'Pengajuan Buka Kunci' && (
                  <div className="bg-amber-50 border border-amber-100 p-4 rounded-2xl animate-fadeIn">
                      <p className="text-[10px] font-black text-amber-600 uppercase mb-2 flex items-center gap-1"><Icons.Bell/> Pengajuan Buka Kunci</p>
                      <p className="text-xs font-medium text-amber-800 leading-relaxed">Siswa ini memohon untuk dibukakan kunci datanya agar dapat melakukan perbaikan.</p>
                  </div>
              )}

              <div className="flex items-center justify-between bg-gray-50 p-4 rounded-2xl">
                  <div>
                      <p className="text-[10px] font-black text-gray-400 uppercase">Status Verifikasi</p>
                      <p className={`text-sm font-bold flex items-center gap-1 ${data.is_locked ? 'text-green-600' : (data.status_verifikasi === 'Perbaikan' ? 'text-red-600' : 'text-amber-600')}`}>
                          {data.is_locked ? <Icons.CheckCircle/> : (data.status_verifikasi === 'Perbaikan' ? <Icons.AlertTriangle/> : <Icons.Unlock/>)} 
                          {data.status_verifikasi || 'Pending'}
                      </p>
                  </div>
                  <div className="text-right">
                      <p className="text-[10px] font-black text-gray-400 uppercase">Progres</p>
                      <p className="text-xl font-black text-blue-600">{data.progres_persen}%</p>
                  </div>
              </div>
              
              <div>
                  <p className="text-[10px] font-black text-blue-500 uppercase border-b pb-2 mb-3">Identitas Pribadi</p>
                  <div className="grid grid-cols-2 gap-4 text-sm">
                      <div><span className="text-gray-400 block text-[10px]">WhatsApp</span><b>{data.wa_siswa || '-'}</b></div>
                      <div><span className="text-gray-400 block text-[10px]">Email</span><b className="break-all">{data.email_siswa || '-'}</b></div>
                  </div>
              </div>

              <div>
                  <p className="text-[10px] font-black text-blue-500 uppercase border-b pb-2 mb-3">Data Orang Tua</p>
                  <div className="grid grid-cols-2 gap-6 text-sm">
                      <div>
                          <span className="text-gray-400 block text-[10px]">Ayah ({data.status_ayah || '-'})</span>
                          <b>{data.status_ayah === 'Masih Hidup' ? data.nama_ayah : '-'}</b>
                          {data.status_ayah === 'Masih Hidup' && (
                              <div className="mt-1 text-xs">
                                  <span className="block text-gray-500">WA: {data.wa_ayah || '-'}</span>
                                  <span className="block text-gray-500 break-all">Email: {data.email_ayah || '-'}</span>
                              </div>
                          )}
                      </div>
                      <div>
                          <span className="text-gray-400 block text-[10px]">Ibu ({data.status_ibu || '-'})</span>
                          <b>{data.status_ibu === 'Masih Hidup' ? data.nama_ibu : '-'}</b>
                          {data.status_ibu === 'Masih Hidup' && (
                              <div className="mt-1 text-xs">
                                  <span className="block text-gray-500">WA: {data.wa_ibu || '-'}</span>
                                  <span className="block text-gray-500 break-all">Email: {data.email_ibu || '-'}</span>
                              </div>
                          )}
                      </div>
                  </div>
              </div>

              <div>
                  <p className="text-[10px] font-black text-blue-500 uppercase border-b pb-2 mb-3">Berkas Digital</p>
                  <div className="flex gap-2">
                      {data.link_kartukeluarga ? 
                          <div className="flex-1 relative">
                              <button onClick={() => onOpenGallery(data.nisn, 'kk')} className="w-full bg-blue-50 text-blue-600 p-3 rounded-xl flex flex-col items-center hover:bg-blue-100 transition-colors">
                                  <Icons.Image/><span className="text-[9px] font-bold mt-1">LIHAT KK</span>
                              </button>
                              {(role === 'wali' || role === 'super_admin' || role === 'admin') && (
                                  <button onClick={() => onDeleteFile('link_kartukeluarga')} className="absolute top-1 right-1 p-1.5 bg-white text-red-500 rounded-lg shadow-sm hover:bg-red-50 hover:text-red-700 transition-colors" title="Hapus KK">
                                      <Icons.Trash />
                                  </button>
                              )}
                          </div> : 
                          <div className="flex-1 bg-gray-50 text-gray-400 p-3 rounded-xl flex flex-col items-center opacity-50"><Icons.Image/><span className="text-[9px] font-bold mt-1">KK KOSONG</span></div>
                      }
                      {data.link_ijazah ? 
                          <div className="flex-1 relative">
                              <button onClick={() => onOpenGallery(data.nisn, 'ijazah')} className="w-full bg-blue-50 text-blue-600 p-3 rounded-xl flex flex-col items-center hover:bg-blue-100 transition-colors">
                                  <Icons.FileText/><span className="text-[9px] font-bold mt-1">LIHAT IJAZAH</span>
                              </button>
                              {(role === 'wali' || role === 'super_admin' || role === 'admin') && (
                                  <button onClick={() => onDeleteFile('link_ijazah')} className="absolute top-1 right-1 p-1.5 bg-white text-red-500 rounded-lg shadow-sm hover:bg-red-50 hover:text-red-700 transition-colors" title="Hapus Ijazah">
                                      <Icons.Trash />
                                  </button>
                              )}
                          </div> : 
                          <div className="flex-1 bg-gray-50 text-gray-400 p-3 rounded-xl flex flex-col items-center opacity-50"><Icons.FileText/><span className="text-[9px] font-bold mt-1">IJAZAH KOSONG</span></div>
                      }
                  </div>
              </div>

              {(role === 'wali' || role === 'super_admin' || role === 'admin') && (
                  <div className="pt-6 border-t border-gray-100">
                      {!rejectMode ? (
                          <div className="flex gap-2">
                              <button onClick={() => setRejectMode(true)} className="flex-1 py-3 bg-red-50 text-red-600 rounded-xl font-bold text-xs uppercase tracking-widest hover:bg-red-100 transition-colors">Tolak & Revisi</button>
                              <button onClick={onVerify} className={`flex-1 py-3 text-white rounded-xl font-bold text-xs uppercase tracking-widest shadow-md transition-colors ${data.is_locked ? 'bg-amber-500 hover:bg-amber-600' : 'bg-green-500 hover:bg-green-600'}`}>
                                  {data.is_locked ? 'Buka Kunci' : 'Verifikasi (Kunci)'}
                              </button>
                          </div>
                      ) : (
                          <div className="bg-gray-50 p-4 rounded-2xl border border-gray-200 animate-fadeIn">
                              <label className="text-[10px] font-black text-gray-600 uppercase block mb-3">Keterangan Perbaikan</label>
                              <div className="flex flex-wrap gap-2 mb-3">
                                  {quickTemplates.map((tmpl, idx) => (
                                      <button key={idx} onClick={() => handleTemplateClick(tmpl)} className="px-2 py-1.5 bg-white border border-gray-200 rounded-lg text-[9px] font-bold text-gray-600 hover:bg-blue-50 hover:text-blue-600 hover:border-blue-200 active:scale-95 transition-all text-left">
                                          + {tmpl}
                                      </button>
                                  ))}
                              </div>
                              <textarea value={rejectNote} onChange={(e) => setRejectNote(e.target.value)} className="w-full p-3 bg-white border border-gray-200 rounded-xl text-xs font-bold outline-none focus:border-blue-500 mb-3" rows="3" placeholder="Ketik manual atau klik template di atas..." />
                              <div className="flex gap-2">
                                  <button onClick={() => setRejectMode(false)} className="flex-1 py-3 bg-gray-200 text-gray-700 rounded-xl font-bold text-xs uppercase tracking-widest hover:bg-gray-300 transition-colors">Batal</button>
                                  <button onClick={() => { onReject(rejectNote); }} className="flex-1 py-3 bg-red-500 text-white rounded-xl font-bold text-xs uppercase tracking-widest hover:bg-red-600 transition-colors">Kirim Catatan</button>
                              </div>
                          </div>
                      )}
                  </div>
              )}
          </div>
        );
    };

    // --- MODULAR VIEWS ---
    const MaintenanceView = ({ config }) => (
        <div className="flex flex-col items-center justify-center min-h-[85vh] px-8 text-center animate-fadeIn">
            <div className="w-24 h-24 bg-amber-100 text-amber-500 rounded-full flex items-center justify-center mb-8 shadow-inner animate-[spin_10s_linear_infinite]"><Icons.Settings /></div>
            <h1 className="text-3xl font-black text-gray-900 mb-4 tracking-tight">Sedang Pemeliharaan</h1>
            <p className="text-gray-500 text-sm mb-10 leading-relaxed max-w-xs mx-auto">{config.maintenanceMessage || 'Sistem sedang dalam proses perbaikan dan pembaruan rutin. Silakan kembali beberapa saat lagi.'}</p>
            <button onClick={() => window.location.reload()} className="px-8 py-4 bg-gray-900 text-white rounded-[2rem] font-black shadow-xl shadow-gray-200 active:scale-95 transition-all text-xs uppercase tracking-widest">Muat Ulang Halaman</button>
        </div>
    );

    // 1. Home View
    const HomeView = ({ config, students, setView }) => {
      const [searchTerm, setSearchTerm] = useState('');
      const [debouncedTerm, setDebouncedTerm] = useState('');
      const [toastMsg, setToastMsg] = useState(null);

      useEffect(() => {
        const h = setTimeout(() => setDebouncedTerm(searchTerm), 250);
        return () => clearTimeout(h);
      }, [searchTerm]);

      const filteredPublic = useMemo(() => {
        const t = debouncedTerm.trim().toLowerCase();
        if (t.length < 3) return [];
        return students.filter(s => String(s.nama || '').toLowerCase().includes(t) || (t.length === 10 && normalizeId(s.nisn) === normalizeId(t)));
      }, [debouncedTerm, students]);

      const handleRowClick = (siswa) => {
        if (siswa.status_verifikasi === 'Verified' || siswa.status_verifikasi === 'Terverifikasi') {
            setToastMsg({ type: 'verified', text: `✅ Data ${siswa.nama} sudah lengkap dan diverifikasi!` });
        } else if (siswa.status_verifikasi === 'Perbaikan') {
            setToastMsg({ type: 'pending', text: `⚠️ Data ${siswa.nama} ditolak Wali Kelas (Butuh Perbaikan).` });
        } else if (siswa.status_verifikasi === 'Pengajuan Buka Kunci') {
            setToastMsg({ type: 'pending', text: `🔔 Data ${siswa.nama} sedang menunggu dibuka Wali Kelas.` });
        } else {
            setToastMsg({ type: 'pending', text: `⏳ Data ${siswa.nama} masih dalam proses / belum diverifikasi.` });
        }
        setTimeout(() => setToastMsg(null), 3000);
      };

      return (
        <div className="flex flex-col items-center min-h-[85vh] px-8 pt-12 animate-fadeIn text-center relative">
          {toastMsg && (
            <div className={`fixed top-8 left-1/2 -translate-x-1/2 text-white px-6 py-3 rounded-full text-[11px] font-black shadow-2xl z-50 animate-slideDown whitespace-nowrap border ${
                toastMsg.type === 'verified' ? 'bg-gradient-to-r from-emerald-500 to-teal-500 shadow-emerald-500/30 border-emerald-400' : 'bg-gradient-to-r from-amber-500 to-orange-500 shadow-orange-500/30 border-orange-400'
            }`}>{toastMsg.text}</div>
          )}

          {config.logoUrl ? (
            <div className="mb-8 h-24 flex items-center justify-center"><img src={config.logoUrl} className="max-h-full max-w-[180px] object-contain drop-shadow-md" onError={(e) => e.target.style.display = 'none'} /></div>
          ) : (
            <div className="w-20 h-20 bg-blue-600 rounded-[2rem] flex items-center justify-center mb-8 shadow-xl text-white"><Icons.ShieldCheck /></div>
          )}
          <h1 className="text-3xl font-black text-gray-900 mb-2 tracking-tight">{config.appName}</h1>
          <p className="text-gray-400 text-[10px] font-black uppercase tracking-[0.2em] mb-10">Sistem Informasi Pendataan Siswa</p>
          
          <div className="w-full mb-8 relative">
            <div className="absolute left-4 top-4 text-gray-300"><Icons.Search /></div>
            <input 
              type="text" placeholder="Cari Nama / NISN ..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)}
              className="w-full pl-12 pr-12 py-4 bg-white border-2 border-gray-100 rounded-3xl outline-none focus:border-blue-500 font-bold text-sm shadow-sm transition-all"
            />
            {searchTerm && (<button onClick={() => setSearchTerm('')} className="absolute right-4 top-4 text-gray-400 hover:text-gray-600 transition-colors"><Icons.X /></button>)}
            {debouncedTerm.length >= 3 && (
              <div className="mt-4 space-y-2 max-h-[300px] overflow-y-auto z-40 text-left">
                {filteredPublic.map(s => (
                  <div key={s.nisn} onClick={() => handleRowClick(s)} className="bg-white p-4 rounded-2xl border border-gray-100 flex items-center justify-between shadow-sm cursor-pointer hover:bg-blue-50 transition-colors">
                    <div><p className="font-bold text-sm text-gray-800">{s.nama} <span className="text-[10px] text-gray-400">({s.kelas}{s.rombel})</span></p></div>
                    <span className={`text-[9px] font-black px-2 py-1 rounded-lg flex items-center gap-1 ${(['Terverifikasi', 'Verified'].includes(s.status_verifikasi)) ? 'bg-green-50 text-green-600' : (['Perbaikan', 'Pengajuan Buka Kunci'].includes(s.status_verifikasi) ? 'bg-amber-50 text-amber-600' : 'bg-gray-50 text-gray-600')}`}>
                        {(['Terverifikasi', 'Verified'].includes(s.status_verifikasi)) && <Icons.Check/>} 
                        {(s.status_verifikasi === 'Perbaikan') && <Icons.AlertTriangle/>} 
                        {(s.status_verifikasi === 'Pengajuan Buka Kunci') && <Icons.Bell/>} 
                        {(!['Terverifikasi', 'Verified', 'Perbaikan', 'Pengajuan Buka Kunci'].includes(s.status_verifikasi)) && <Icons.Unlock/>}
                        {(['Terverifikasi', 'Verified'].includes(s.status_verifikasi)) ? 'TERVERIFIKASI' : (s.status_verifikasi === 'Perbaikan' ? 'PERBAIKAN' : (s.status_verifikasi === 'Pengajuan Buka Kunci' ? 'PENGAJUAN' : 'PENDING'))}
                    </span>
                  </div>
                ))}
                {filteredPublic.length === 0 && <div className="p-6 text-xs text-gray-400">Data tidak ditemukan</div>}
              </div>
            )}
          </div>
          
          {config.showAnnouncement && config.announcementText && (
              <div className="w-full mb-8 animate-fadeIn text-left">
                  <div className="bg-gradient-to-br from-blue-50 to-indigo-50 p-5 rounded-2xl border border-blue-100 shadow-sm relative overflow-hidden">
                      <div className="absolute top-0 left-0 w-1 h-full bg-blue-500"></div>
                      <h3 className="text-[10px] font-black text-blue-600 mb-2 uppercase tracking-widest flex items-center gap-2"><Icons.Bell /> PENGUMUMAN</h3>
                      <p className="text-xs text-gray-700 leading-relaxed whitespace-pre-wrap">{config.announcementText}</p>
                  </div>
              </div>
          )}

          <div className="w-full space-y-3 mb-10">
            <button onClick={() => setView('login')} className="w-full py-5 bg-blue-600 text-white rounded-3xl font-black text-sm shadow-xl shadow-blue-100 active:scale-95 transition-all flex items-center justify-center gap-2"><Icons.User /> Masuk ke Aplikasi</button>
            <button onClick={() => setView('user_guide')} className="w-full py-4 bg-white text-blue-600 border border-blue-100 rounded-3xl font-black text-sm active:scale-95 transition-all flex items-center justify-center gap-2 hover:bg-blue-50"><Icons.BookOpen /> Panduan Pengguna</button>
          </div>

          {config.showPublicProgress && config.classList?.length > 0 && (
              <div className="w-full mb-8 animate-fadeIn text-left">
                  <h3 className="text-xs font-black text-gray-800 mb-4 flex items-center gap-2 pl-2"><Icons.ShieldCheck /> Progres Pengisian Data</h3>
                  <div className="flex gap-4 overflow-x-auto pb-4 snap-x snap-mandatory hide-scrollbar">
                      {config.classList.map(cls => {
                          const rombels = config.rombelByClass?.[cls] || [];
                          return (
                              <div key={cls} className="bg-white p-6 rounded-[2rem] border border-gray-100 shadow-sm w-[90%] sm:w-[300px] shrink-0 snap-center">
                                  <div className="flex items-center justify-between border-b border-gray-50 pb-3 mb-4">
                                      <h4 className="font-black text-xs text-blue-600 uppercase tracking-widest">KELAS {cls}</h4>
                                      <span className="text-[9px] font-bold bg-blue-50 text-blue-500 px-2.5 py-1 rounded-lg">{rombels.length} Rombel</span>
                                  </div>
                                  <div className="space-y-4">
                                      {rombels.map(rmb => {
                                          const rmbStudents = students.filter(s => String(s.kelas) === String(cls) && String(s.rombel) === String(rmb));
                                          const total = rmbStudents.length;
                                          const avg = total > 0 ? Math.round(rmbStudents.reduce((sum, s) => sum + (s.progres_persen || 0), 0) / total) : 0;
                                          return (
                                              <div key={rmb} className="flex items-center gap-3">
                                                  <span className="w-8 text-[11px] font-black text-gray-700">{cls}{rmb}</span>
                                                  <div className="flex-1 bg-gray-100 rounded-full h-2.5 overflow-hidden">
                                                      <div className={`h-full rounded-full transition-all duration-1000 ${avg === 100 ? 'bg-green-500' : avg >= 50 ? 'bg-blue-500' : 'bg-amber-500'}`} style={{ width: `${avg}%` }}></div>
                                                  </div>
                                                  <span className="w-8 text-right text-[10px] font-black text-gray-500">{avg}%</span>
                                              </div>
                                          );
                                      })}
                                      {rombels.length === 0 && <p className="text-[10px] text-gray-400 text-center py-2">Belum ada data rombel.</p>}
                                  </div>
                              </div>
                          );
                      })}
                  </div>
              </div>
          )}
        </div>
      );
    };

    // 1b. Panduan Pengguna
    const UserGuideView = ({ setView, config }) => (
      <div className="p-6 animate-fadeIn pb-12 pt-10">
        <button onClick={() => setView('home')} className="mb-6 text-gray-400 flex items-center gap-2 font-bold text-sm uppercase tracking-widest hover:text-gray-600 transition-colors"><Icons.ArrowLeft /> Kembali</button>
        <h2 className="text-2xl font-black mb-6 text-gray-900 flex items-center gap-2"><Icons.BookOpen /> Panduan Pengguna</h2>
        
        <div className="space-y-6">
            <section className="bg-white p-5 rounded-[2rem] shadow-sm border border-gray-100">
                <h3 className="text-sm font-black text-blue-600 mb-3 uppercase tracking-widest border-b pb-2">1. Alur Pengisian Data Siswa</h3>
                <ol className="list-decimal list-inside text-xs text-gray-600 space-y-3 leading-relaxed pl-2">
                    <li>Gunakan kolom pencarian di halaman depan untuk memeriksa status data Anda.</li>
                    <li>Klik <b>Masuk</b> dan masukkan <b>NISN</b> serta sandi bawaan sistem.</li>
                    <li>Sistem akan meminta Anda untuk membuat kata sandi baru demi keamanan data Anda.</li>
                    <li>Lengkapi formulir yang terbagi dalam 4 tahap (Pribadi, Ayah, Ibu, Berkas).</li>
                    <li>Klik <b>Simpan & Finalisasi</b> agar data tersimpan dan dapat diperiksa Wali Kelas.</li>
                </ol>
            </section>

            <section className="bg-white p-5 rounded-[2rem] shadow-sm border border-gray-100">
                <h3 className="text-sm font-black text-amber-500 mb-3 uppercase tracking-widest border-b pb-2">2. FAQ (Kendala Umum)</h3>
                <div className="space-y-4 text-xs">
                    <div>
                        <p className="font-bold text-gray-800 flex items-center gap-1"><Icons.HelpCircle /> Lupa kata sandi baru?</p>
                        <p className="text-gray-500 mt-1 pl-5">Silakan lapor kepada Wali Kelas Anda. Wali Kelas memiliki kewenangan untuk mereset sandi Anda kembali ke default.</p>
                    </div>
                    <div>
                        <p className="font-bold text-gray-800 flex items-center gap-1"><Icons.HelpCircle /> Tombol "Update Data" hilang?</p>
                        <p className="text-gray-500 mt-1 pl-5">Ini berarti data Anda sudah dikunci (Terverifikasi) oleh Wali Kelas. Anda dapat mengklik tombol "Ajukan Perbaikan Data" pada profil Anda untuk mengirimkan permohonan buka kunci langsung ke dashboard Wali Kelas.</p>
                    </div>
                    <div>
                        <p className="font-bold text-gray-800 flex items-center gap-1"><Icons.HelpCircle /> Gagal unggah gambar KK/Ijazah?</p>
                        <p className="text-gray-500 mt-1 pl-5">Pastikan file berupa gambar (JPG/PNG). Foto yang sangat besar (> 10MB) akan ditolak sistem. Sistem akan otomatis memperkecil foto normal agar upload lebih cepat.</p>
                    </div>
                </div>
            </section>
            
            {(config.showCsContact !== false) && (
                <section className="bg-blue-50 p-6 rounded-[2rem] border border-blue-100 text-center">
                    <div className="w-12 h-12 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-3"><Icons.Phone /></div>
                    <h3 className="text-sm font-black text-blue-900 mb-2">Layanan Bantuan (CS)</h3>
                    <p className="text-xs text-blue-700 leading-relaxed mb-4">Jika Anda mengalami kendala sistem yang tidak tertera pada FAQ, hubungi Admin/IT Support Sekolah:</p>
                    <div className="bg-white p-3 rounded-xl inline-block text-left shadow-sm">
                        <p className="text-xs font-bold text-gray-800">WA: {config.csNumber || '08XX-XXXX-XXXX'} (Admin)</p>
                        <p className="text-[10px] font-bold text-gray-400 mt-1">Senin - Jumat (08.00 - 15.00 WIB)</p>
                    </div>
                </section>
            )}
        </div>
      </div>
    );

    // 2. Login View
    const LoginView = ({ handleLogin, setView, showAlert }) => {
      const [showPassword, setShowPassword] = useState(false);

      const handleLupaSandi = () => {
          showAlert("Jika Anda lupa Kode Akses, silakan lapor kepada Wali Kelas Anda secara langsung atau melalui WhatsApp. Wali Kelas memiliki tombol khusus untuk mereset akun Anda kembali ke pengaturan awal dengan aman.", "Lupa Kode Keamanan?");
      };

      return (
        <div className="p-10 pt-20 animate-fadeIn">
          <button onClick={() => setView('home')} className="mb-10 text-gray-400 flex items-center gap-2 font-black text-[10px] uppercase tracking-widest hover:text-gray-600 transition-colors"><Icons.ArrowLeft /> Kembali</button>
          <h2 className="text-3xl font-black mb-10 tracking-tight">Pintu Masuk</h2>
          <form className="space-y-6" onSubmit={handleLogin}>
            <div>
              <label className="block text-[10px] font-black text-blue-600 mb-2 uppercase tracking-widest">Identitas (NISN / Username)</label>
              <input name="identity" required autoComplete="username" className="w-full p-5 bg-white border-2 border-gray-100 rounded-3xl outline-none focus:border-blue-500 font-bold transition-all" placeholder="Masukkan ID" />
            </div>
            <div>
              <label className="block text-[10px] font-black text-blue-600 mb-2 uppercase tracking-widest">Kode Keamanan</label>
              <div className="relative">
                <input name="kode" type={showPassword ? "text" : "password"} required autoComplete="current-password" 
                  className="w-full p-5 pr-14 bg-white border-2 border-gray-100 rounded-3xl outline-none focus:border-blue-500 font-bold transition-all" placeholder="••••••••" 
                />
                <button type="button" onClick={() => setShowPassword(!showPassword)} className="absolute right-5 top-1/2 -translate-y-1/2 text-gray-400 hover:text-blue-600 transition-colors focus:outline-none">
                  {showPassword ? <Icons.EyeOff /> : <Icons.Eye />}
                </button>
              </div>
              <div className="text-right mt-3">
                  <button type="button" onClick={handleLupaSandi} className="text-[10px] font-bold text-gray-400 hover:text-blue-600 transition-colors">Lupa Kode Keamanan?</button>
              </div>
            </div>
            <button className="w-full py-5 bg-blue-600 text-white rounded-3xl font-black shadow-xl shadow-blue-100 active:scale-95 transition-all">MASUK KE DASHBOARD</button>
          </form>
        </div>
      );
    };

    // 3. Activation View (Siswa)
    const ActivationView = ({ currentUser, setCurrentUser, saveStudentToDB, setView, showAlert, config }) => {
      const [showPassword, setShowPassword] = useState(false);
      const [showConfirmPassword, setShowConfirmPassword] = useState(false);

      const handleActivation = (e) => {
        e.preventDefault();
        const newCode = e.target.elements.new_code.value;
        const confirmCode = e.target.elements.confirm_code.value;
        const classKey = `${currentUser.kelas}-${currentUser.rombel}`;
        const defaultKodeClass = config.defaultCodes?.[classKey] || '123456';

        if (newCode.length < 6) return showAlert("Kode minimal 6 karakter demi keamanan akun Anda.", "Peringatan");
        if (newCode === '123456' || newCode === defaultKodeClass) return showAlert("Peringatan: Silakan gunakan kata sandi yang berbeda dari kode bawaan untuk mengamankan data Anda.", "Keamanan Akun");
        if (newCode !== confirmCode) return showAlert("Konfirmasi kata sandi tidak cocok. Silakan periksa kembali.", "Peringatan");
        
        const updatedStudent = { ...currentUser, is_active: true, kode_akses: newCode };
        
        saveStudentToDB(updatedStudent);
        setCurrentUser(null);
        localStorage.removeItem('siswaHubSession');
        
        showAlert("Aktivasi berhasil! Silakan masuk kembali menggunakan Kode Keamanan Anda yang baru.", "Berhasil Disimpan");
        setView('login');
      };

      return (
        <div className="p-8 animate-fadeIn text-center mt-10">
          <div className="w-20 h-20 bg-amber-100 text-amber-600 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner"><Icons.Lock /></div>
          <h2 className="text-2xl font-black">Aktivasi Akun</h2>
          <p className="text-sm text-gray-500 mt-3 mb-10 leading-relaxed">Harap ganti kode akses bawaan Anda dengan password baru yang mudah diingat untuk keamanan data.</p>
          <form onSubmit={handleActivation} className="space-y-4 text-left">
            <div>
              <label className="block text-[10px] font-black text-gray-400 mb-2 uppercase tracking-widest">Buat Password Baru</label>
              <div className="relative">
                <input name="new_code" type={showPassword ? "text" : "password"} required autoComplete="new-password" 
                    className="w-full p-4 pr-14 bg-white border-2 border-gray-100 rounded-2xl outline-none focus:border-blue-500 font-bold" placeholder="Minimal 6 karakter" />
                <button type="button" onClick={() => setShowPassword(!showPassword)} className="absolute right-5 top-1/2 -translate-y-1/2 text-gray-400 hover:text-blue-600 transition-colors focus:outline-none">{showPassword ? <Icons.EyeOff /> : <Icons.Eye />}</button>
              </div>
            </div>
            <div>
              <label className="block text-[10px] font-black text-gray-400 mb-2 uppercase tracking-widest">Konfirmasi Password Baru</label>
              <div className="relative">
                <input name="confirm_code" type={showConfirmPassword ? "text" : "password"} required autoComplete="new-password" className="w-full p-4 pr-14 bg-white border-2 border-gray-100 rounded-2xl outline-none focus:border-blue-500 font-bold" placeholder="Ketik ulang password" />
                <button type="button" onClick={() => setShowConfirmPassword(!showConfirmPassword)} className="absolute right-5 top-1/2 -translate-y-1/2 text-gray-400 hover:text-blue-600 transition-colors focus:outline-none">
                  {showConfirmPassword ? <Icons.EyeOff /> : <Icons.Eye />}
                </button>
              </div>
            </div>
            <button type="submit" className="w-full py-5 bg-green-600 text-white rounded-3xl font-black shadow-xl shadow-green-100 active:scale-95 transition-all">Simpan & Login Ulang</button>
          </form>
        </div>
      );
    };

    // 3b. Wali Activation View (Guru)
    const WaliActivationView = ({ currentUser, setCurrentUser, setTeachers, setView, showAlert }) => {
      const [showPassword, setShowPassword] = useState(false);
      const [showConfirmPassword, setShowConfirmPassword] = useState(false);

      const handleActivation = (e) => {
        e.preventDefault();
        const newCode = e.target.elements.new_code.value;
        const confirmCode = e.target.elements.confirm_code.value;
        if (newCode.length < 6) return showAlert("Password minimal 6 karakter", "Peringatan");
        if (newCode === 'GURU123') return showAlert("Jangan gunakan password bawaan (GURU123). Buatlah password baru yang aman dan rahasia.", "Keamanan Akun");
        if (newCode !== confirmCode) return showAlert("Konfirmasi kata sandi tidak cocok.", "Peringatan");
        
        const updatedTeacher = { ...currentUser, kode: newCode };
        
        setTeachers(prev => prev.map(t => t.username === updatedTeacher.username ? updatedTeacher : t));
        if (typeof google !== 'undefined') {
            google.script.run
            .withFailureHandler(err => showAlert("Gagal menyimpan password baru: " + err.message, "Kesalahan Sistem"))
            .updateTeacherData(updatedTeacher);
        }
        
        setCurrentUser(null);
        localStorage.removeItem('siswaHubSession');
        
        showAlert("Aktivasi Wali Kelas berhasil! Silakan masuk kembali menggunakan Password Anda yang baru.", "Berhasil Disimpan");
        setView('login');
      };

      return (
        <div className="p-8 animate-fadeIn text-center mt-10">
          <div className="w-20 h-20 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner"><Icons.Lock /></div>
          <h2 className="text-2xl font-black">Aktivasi Wali Kelas</h2>
          <p className="text-sm text-gray-500 mt-3 mb-10 leading-relaxed">Harap ganti password bawaan Anda (GURU123) demi keamanan data kelas.</p>
          <form onSubmit={handleActivation} className="space-y-4 text-left">
            <div>
              <label className="block text-[10px] font-black text-gray-400 mb-2 uppercase tracking-widest">Buat Password Baru</label>
              <div className="relative">
                <input name="new_code" type={showPassword ? "text" : "password"} required autoComplete="new-password" 
                    className="w-full p-4 pr-14 bg-white border-2 border-gray-100 rounded-2xl outline-none focus:border-blue-500 font-bold" placeholder="Minimal 6 karakter" />
                <button type="button" onClick={() => setShowPassword(!showPassword)} className="absolute right-5 top-1/2 -translate-y-1/2 text-gray-400 hover:text-blue-600 transition-colors focus:outline-none">{showPassword ? <Icons.EyeOff /> : <Icons.Eye />}</button>
              </div>
            </div>
            <div>
              <label className="block text-[10px] font-black text-gray-400 mb-2 uppercase tracking-widest">Konfirmasi Password Baru</label>
              <div className="relative">
                <input name="confirm_code" type={showConfirmPassword ? "text" : "password"} required autoComplete="new-password" className="w-full p-4 pr-14 bg-white border-2 border-gray-100 rounded-2xl outline-none focus:border-blue-500 font-bold" placeholder="Ketik ulang password" />
                <button type="button" onClick={() => setShowConfirmPassword(!showConfirmPassword)} className="absolute right-5 top-1/2 -translate-y-1/2 text-gray-400 hover:text-blue-600 transition-colors focus:outline-none">
                  {showConfirmPassword ? <Icons.EyeOff /> : <Icons.Eye />}
                </button>
              </div>
            </div>
            <button type="submit" className="w-full py-5 bg-blue-600 text-white rounded-3xl font-black shadow-xl shadow-blue-100 active:scale-95 transition-all">Simpan & Login Ulang</button>
          </form>
        </div>
      );
    };

    // 4. Student Profile View
    const StudentProfileView = ({ currentUser, setCurrentUser, config, setView, onOpenGallery, handleLogout, saveStudentToDB, showConfirm, showAlert }) => {
      const classKey = currentUser.kelas;
      const permKey = `${currentUser.kelas}-${currentUser.rombel}`;
      const classEnabled = config.editPermissions?.[classKey] ?? true;
      const rombelEnabled = config.editPermissions?.[permKey] ?? true;
      const canEdit = (!currentUser.is_locked || String(currentUser.status_verifikasi).toLowerCase() === 'pending' || String(currentUser.status_verifikasi).toLowerCase() === 'perbaikan') && classEnabled && rombelEnabled;
      
      const [showStudentGuide, setShowStudentGuide] = useState(false);

      useEffect(() => {
          const guideSeen = localStorage.getItem(`guide_seen_${currentUser.nisn}`);
          if (!guideSeen && currentUser.progres_persen < 100) {
              setShowStudentGuide(true);
              localStorage.setItem(`guide_seen_${currentUser.nisn}`, 'true');
          }
      }, [currentUser]);

      const handleRequestUnlock = () => {
          showConfirm("Ajukan permohonan buka kunci ke Wali Kelas? Data Anda akan ditandai untuk ditinjau ulang oleh Wali Kelas.", () => {
              const updatedStudent = { ...currentUser, status_verifikasi: 'Pengajuan Buka Kunci' };
              setCurrentUser(updatedStudent);
              saveStudentToDB(updatedStudent);
              showAlert("Permohonan berhasil dikirim ke dashboard Wali Kelas. Silakan tunggu persetujuan.", "Terkirim");
          });
      };

      return (
        <div className="p-6 pb-24 animate-fadeIn pt-10 min-h-screen relative">
          <div className="flex justify-between items-center mb-6">
              <div><h2 className="text-[10px] font-black text-blue-600 uppercase tracking-widest">Ruang Siswa</h2></div>
              <div className="flex gap-2">
                  <button onClick={() => setShowStudentGuide(true)} className="p-2 bg-blue-50 text-blue-600 rounded-xl hover:bg-blue-100 transition-colors" title="Panduan Siswa"><Icons.BookOpen/></button>
                  <button onClick={handleLogout} className="p-2 bg-red-50 text-red-500 rounded-xl hover:bg-red-100 transition-colors" title="Keluar"><Icons.LogOut/></button>
              </div>
          </div>
          
          <ProfileComponent data={currentUser} onOpenGallery={(nisn, type) => onOpenGallery([currentUser], nisn, type)} role="siswa" />

          {canEdit ? (
              <button onClick={() => setView('siswa_form')} className={`w-full mt-6 py-4 text-white rounded-[2rem] font-black flex items-center justify-center gap-2 shadow-xl active:scale-95 transition-all ${currentUser.status_verifikasi === 'Perbaikan' ? 'bg-red-500 shadow-red-200' : 'bg-gray-900 shadow-gray-200'}`}>
                  <Icons.Edit /> {currentUser.status_verifikasi === 'Perbaikan' ? 'PERBAIKI DATA SAYA' : 'UPDATE DATA SAYA'}
              </button>
          ) : (
              <div className="mt-6 space-y-3">
                  <div className="p-4 bg-amber-50 text-amber-700 rounded-2xl text-xs text-center font-medium border border-amber-100">
                      {currentUser.is_locked ? "Data Anda telah dikunci oleh Wali Kelas karena sudah sesuai." : "Akses edit untuk kelas Anda saat ini sedang ditutup oleh Admin."}
                  </div>
                  {currentUser.is_locked && currentUser.status_verifikasi !== 'Pengajuan Buka Kunci' && (
                      <button onClick={handleRequestUnlock} className="w-full py-4 bg-white border-2 border-amber-200 text-amber-600 rounded-[2rem] font-black flex items-center justify-center gap-2 shadow-sm hover:bg-amber-50 active:scale-95 transition-all"><Icons.Unlock /> AJUKAN PERBAIKAN DATA</button>
                  )}
                  {currentUser.status_verifikasi === 'Pengajuan Buka Kunci' && (
                      <div className="w-full py-4 bg-amber-100 text-amber-600 rounded-[2rem] font-black flex items-center justify-center gap-2 border border-amber-200 text-xs"><Icons.Bell /> MENUNGGU PERSETUJUAN WALI KELAS</div>
                  )}
              </div>
          )}

          {showStudentGuide && (
              <div className="fixed inset-0 z-50 bg-black/40 backdrop-blur-sm flex items-center justify-center p-4 sm:p-6 animate-fadeIn">
                  <div className="bg-white p-6 rounded-[2rem] w-full max-w-sm shadow-2xl relative flex flex-col max-h-[85vh]">
                      <button onClick={() => setShowStudentGuide(false)} className="absolute top-6 right-6 text-gray-400 hover:text-gray-600 bg-gray-100 p-2 rounded-full transition-colors z-10"><Icons.X/></button>
                      <div className="flex items-center gap-3 mb-6 border-b pb-4">
                          <div className="p-3 bg-blue-600 text-white rounded-xl"><Icons.BookOpen /></div>
                          <div><h3 className="font-black text-lg text-gray-900 leading-tight">Panduan Siswa</h3><p className="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Langkah Pengisian Data</p></div>
                      </div>
                      
                      <div className="overflow-y-auto pr-2 space-y-5 flex-1 hide-scrollbar">
                          <div className="bg-blue-50/50 p-4 rounded-2xl border border-blue-100">
                              <p className="text-[11px] text-blue-800 leading-relaxed font-medium">Selamat! Akun Anda sudah diamankan. Ikuti 5 langkah mudah berikut untuk menyelesaikan pendataan:</p>
                          </div>
                          <div className="flex gap-3">
                              <div className="flex-shrink-0 w-6 h-6 rounded-full bg-blue-100 text-blue-600 font-black flex items-center justify-center text-xs">1</div>
                              <div><h4 className="font-bold text-gray-800 text-xs mb-1">Siapkan Dokumen Asli</h4><p className="text-[10px] text-gray-500 leading-relaxed">Siapkan Kartu Keluarga (KK) dan Ijazah asli atau fotokopi yang tulisannya masih sangat jelas.</p></div>
                          </div>
                          <div className="flex gap-3">
                              <div className="flex-shrink-0 w-6 h-6 rounded-full bg-blue-100 text-blue-600 font-black flex items-center justify-center text-xs">2</div>
                              <div><h4 className="font-bold text-gray-800 text-xs mb-1">Mulai Perbarui Data</h4><p className="text-[10px] text-gray-500 leading-relaxed">Klik tombol hitam <b className="text-gray-800">"UPDATE DATA SAYA"</b> yang ada di halaman utama profil ini.</p></div>
                          </div>
                          <div className="flex gap-3">
                              <div className="flex-shrink-0 w-6 h-6 rounded-full bg-blue-100 text-blue-600 font-black flex items-center justify-center text-xs">3</div>
                              <div><h4 className="font-bold text-gray-800 text-xs mb-1">Isi Formulir Bertahap</h4><p className="text-[10px] text-gray-500 leading-relaxed">Lengkapi Tahap 1 (Identitas Pribadi), Tahap 2 (Data Ayah), dan Tahap 3 (Data Ibu). Pastikan tidak ada yang salah ketik.</p></div>
                          </div>
                          <div className="flex gap-3">
                              <div className="flex-shrink-0 w-6 h-6 rounded-full bg-blue-100 text-blue-600 font-black flex items-center justify-center text-xs">4</div>
                              <div><h4 className="font-bold text-gray-800 text-xs mb-1">Unggah Berkas</h4><p className="text-[10px] text-gray-500 leading-relaxed">Di Tahap 4, pilih/foto KK dan Ijazah Anda. Tunggu proses kompresi otomatis sampai muncul tulisan hijau "File Tersimpan".</p></div>
                          </div>
                          <div className="flex gap-3">
                              <div className="flex-shrink-0 w-6 h-6 rounded-full bg-blue-100 text-blue-600 font-black flex items-center justify-center text-xs">5</div>
                              <div><h4 className="font-bold text-gray-800 text-xs mb-1">Simpan Data</h4><p className="text-[10px] text-gray-500 leading-relaxed">Terakhir, klik tombol biru <b className="text-blue-600">"SIMPAN DATA"</b>. Progres Anda akan menjadi 100% dan tinggal menunggu verifikasi Wali Kelas.</p></div>
                          </div>
                      </div>
                      <div className="mt-4 pt-4 border-t">
                          <button onClick={() => setShowStudentGuide(false)} className="w-full py-4 bg-blue-600 text-white rounded-2xl font-black text-xs uppercase tracking-widest shadow-lg shadow-blue-200 active:scale-95 transition-all">Mengerti & Tutup</button>
                      </div>
                  </div>
              </div>
          )}
        </div>
      );
    };

    // 5. Form Siswa
    const DashboardSiswaForm = ({ currentUser, setCurrentUser, config, setView, saveStudentToDB, showAlert }) => {
        const [step, setStep] = useState(1);
        const [formData, setFormData] = useState(currentUser);
        const [uploading, setUploading] = useState({ kk: false, ijazah: false });

        const handleNext = () => {
            if (step === 1) {
                if (!formData.nama || !formData.kelas || !formData.rombel || !formData.wa_siswa) return showAlert("Mohon lengkapi semua data wajib (*) di Tahap 1.", "Input Belum Lengkap");
                if (formData.wa_siswa.length < 10) return showAlert("Format No. WhatsApp Siswa tidak valid.", "Cek Kembali");
            } else if (step === 2) {
                if (!formData.status_ayah) return showAlert("Pilih status kehidupan ayah.", "Input Belum Lengkap");
                if (formData.status_ayah === 'Masih Hidup') {
                    if (!formData.nama_ayah || !formData.wa_ayah) return showAlert("Mohon lengkapi Nama dan No. WhatsApp Ayah.", "Input Belum Lengkap");
                    if (formData.wa_ayah.length < 10) return showAlert("Format No. WhatsApp Ayah tidak valid.", "Cek Kembali");
                }
            } else if (step === 3) {
                if (!formData.status_ibu) return showAlert("Pilih status kehidupan ibu.", "Input Belum Lengkap");
                if (formData.status_ibu === 'Masih Hidup') {
                    if (!formData.nama_ibu || !formData.wa_ibu) return showAlert("Mohon lengkapi Nama dan No. WhatsApp Ibu.", "Input Belum Lengkap");
                    if (formData.wa_ibu.length < 10) return showAlert("Format No. WhatsApp Ibu tidak valid.", "Cek Kembali");
                }
            }
            if (step < 4) setStep(step + 1);
            else handleSave();
        };

        const handleSave = () => {
            const now = new Date().toISOString().split('T')[0];
            const finalProgress = calculateProgress(formData);
            
            let newStatusVerifikasi = formData.status_verifikasi;
            let newCatatan = formData.catatan_perbaikan;
            if (formData.status_verifikasi === 'Perbaikan') {
                newStatusVerifikasi = 'Pending';
                newCatatan = '';
            }

            const updated = { ...formData, last_update: now, progres_persen: finalProgress, status_verifikasi: newStatusVerifikasi, catatan_perbaikan: newCatatan };
            setCurrentUser(updated);
            saveStudentToDB(updated);
            showAlert("Data Anda berhasil diperbarui dan dikirim ke sistem untuk diverifikasi kembali.", "Berhasil Disimpan");
            setView('siswa_profile');
        };

        const handleFileChange = (e, type) => {
            const file = e.target.files[0];
            if (!file) return;

            if (file.size > 10 * 1024 * 1024) {
                return showAlert("Ukuran file asli terlalu besar! Maksimal 10MB sebelum dikompresi otomatis. Mohon kurangi resolusi kamera Anda.", "File Ditolak");
            }

            const docKey = type === 'kk' ? 'link_kartukeluarga' : 'link_ijazah';
            
            const safeKelas = formData.kelas || 'KLS';
            const safeRombel = formData.rombel || 'RMB';
            const safeNisn = formData.nisn || 'NONISN';
            const fileNamePrefix = `${safeKelas}-${safeRombel}_${safeNisn}_${formData.nama}`;

            if (typeof google === 'undefined') {
                setUploading({...uploading, [type]: true});
                setTimeout(() => {
                    setFormData({...formData, [docKey]: URL.createObjectURL(file)});
                    setUploading({...uploading, [type]: false});
                }, 1000);
                return;
            }

            setUploading({...uploading, [type]: true});
            
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 1200; 
                    const MAX_HEIGHT = 1200;
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                    } else {
                        if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }
                    }
                    canvas.width = width;
                    canvas.height = height;
                    
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);

                    const compressedDataUrl = canvas.toDataURL('image/jpeg', 0.7);

                    if (compressedDataUrl.length * 0.75 > 2 * 1024 * 1024) {
                         setUploading({...uploading, [type]: false});
                         return showAlert("File masih di atas 2MB meskipun sudah dikompresi. Silakan gunakan gambar dengan ukuran/resolusi yang lebih rendah.", "Kompresi Gagal");
                    }

                    google.script.run
                    .withFailureHandler(err => {
                        setUploading({...uploading, [type]: false});
                        showAlert("Terjadi kendala saat mengunggah: " + err.message, "Gagal Mengunggah");
                    })
                    .withSuccessHandler(resRaw => {
                        setUploading({...uploading, [type]: false});
                        try {
                            const res = typeof resRaw === 'string' ? JSON.parse(resRaw) : resRaw;
                            if (res && res.success) setFormData({...formData, [docKey]: res.url});
                            else showAlert("Gagal upload: " + (res ? res.message : "Pesan error tidak diketahui dari server."), "Gagal Mengunggah");
                        } catch(err) {
                            showAlert("Gagal memproses data balasan dari server.", "Kesalahan Sistem");
                        }
                    }).uploadFileToDrive(compressedDataUrl, fileNamePrefix, type);
                };
                img.onerror = () => {
                    setUploading({...uploading, [type]: false});
                    showAlert("File gambar rusak atau tidak dapat diproses oleh peramban.", "Error");
                };
            };
        };

        return (
            <div className="p-6 pb-24 animate-fadeIn pt-10">
                <div className="flex items-center gap-4 mb-8">
                    <button onClick={() => setView('siswa_profile')} className="p-2 bg-gray-100 rounded-xl hover:bg-gray-200 transition-colors"><Icons.X/></button>
                    <h2 className="text-xl font-black">Edit Data</h2>
                </div>
                
                <div className="bg-white p-6 rounded-[2rem] border shadow-sm relative overflow-hidden">
                    <div className="flex justify-between mb-8 relative px-2">
                        <div className="absolute top-1/2 left-4 right-4 h-1 bg-gray-100 -translate-y-1/2 -z-10"></div>
                        <div className="absolute top-1/2 left-4 h-1 bg-blue-600 -translate-y-1/2 -z-10 transition-all duration-300" style={{ width: `${((step - 1) / 3) * 100}%`, maxWidth: 'calc(100% - 2rem)' }}></div>
                        {[1,2,3,4].map(s => (
                            <div key={s} className={`w-8 h-8 rounded-full flex items-center justify-center text-xs font-black transition-all duration-300 ${step >= s ? 'bg-blue-600 text-white shadow-md shadow-blue-200' : 'bg-gray-200 text-gray-400'}`}>
                                {step > s ? <Icons.Check /> : s}
                            </div>
                        ))}
                    </div>

                    <div className="min-h-[350px]">
                      {step === 1 && (
                          <div className="animate-fadeIn">
                              <h3 className="text-xs font-black text-blue-600 uppercase mb-4">1. Identitas Pribadi</h3>
                              <InputField label="Nama (Sesuai Ijazah)" name="nama" formData={formData} setFormData={setFormData} required />
                              <div className="grid grid-cols-2 gap-2">
                                  <div className="mb-4">
                                      <label className="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1 block">Kelas <span className="text-red-500 ml-1">*</span></label>
                                      <select value={formData.kelas || ''} onChange={(e) => setFormData({...formData, kelas: e.target.value, rombel: ''})} className="w-full p-3 bg-gray-50 border rounded-xl font-bold text-sm outline-none focus:border-blue-500 transition-colors">
                                          <option value="">Pilih...</option>
                                          {config.classList?.map(o => <option key={o} value={o}>{o}</option>)}
                                      </select>
                                  </div>
                                  <div className="mb-4">
                                      <label className="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1 block">Rombel <span className="text-red-500 ml-1">*</span></label>
                                      <select value={formData.rombel || ''} onChange={(e) => setFormData({...formData, rombel: e.target.value})} className="w-full p-3 bg-gray-50 border rounded-xl font-bold text-sm outline-none focus:border-blue-500 transition-colors" disabled={!formData.kelas}>
                                          <option value="">Pilih...</option>
                                          {(config.rombelByClass?.[formData.kelas] || []).map(o => <option key={o} value={o}>{o}</option>)}
                                      </select>
                                  </div>
                              </div>
                              <InputField label="No. WhatsApp" name="wa_siswa" placeholder="628xxxxxxxx" formData={formData} setFormData={setFormData} required isWA />
                              <InputField label="Email Siswa" name="email_siswa" placeholder="email@contoh.com" formData={formData} setFormData={setFormData} />
                          </div>
                      )}
                      {step === 2 && (
                          <div className="animate-fadeIn">
                              <h3 className="text-xs font-black text-blue-600 uppercase mb-4">2. Data Ayah</h3>
                              <InputField label="Status Kehidupan" name="status_ayah" type="select" options={['Masih Hidup', 'Meninggal', 'Tidak Diketahui']} formData={formData} setFormData={setFormData} required />
                              {formData.status_ayah === 'Masih Hidup' && (
                                  <>
                                    <InputField label="Nama Ayah" name="nama_ayah" formData={formData} setFormData={setFormData} required />
                                    <InputField label="No. WhatsApp Ayah" name="wa_ayah" placeholder="628xxxxxxxx" formData={formData} setFormData={setFormData} required isWA />
                                    <InputField label="Email Ayah" name="email_ayah" placeholder="email@contoh.com" formData={formData} setFormData={setFormData} />
                                  </>
                              )}
                          </div>
                      )}
                      {step === 3 && (
                          <div className="animate-fadeIn">
                              <h3 className="text-xs font-black text-pink-600 uppercase mb-4">3. Data Ibu</h3>
                              <InputField label="Status Kehidupan" name="status_ibu" type="select" options={['Masih Hidup', 'Meninggal', 'Tidak Diketahui']} formData={formData} setFormData={setFormData} required />
                              {formData.status_ibu === 'Masih Hidup' && (
                                  <>
                                    <InputField label="Nama Ibu" name="nama_ibu" formData={formData} setFormData={setFormData} required />
                                    <InputField label="No. WhatsApp Ibu" name="wa_ibu" placeholder="628xxxxxxxx" formData={formData} setFormData={setFormData} required isWA />
                                    <InputField label="Email Ibu" name="email_ibu" placeholder="email@contoh.com" formData={formData} setFormData={setFormData} />
                                  </>
                              )}
                          </div>
                      )}
                      {step === 4 && (
                            <div className="animate-fadeIn space-y-4">
                                <h3 className="text-xs font-black text-blue-600 uppercase mb-4">4. Upload Berkas</h3>
                                {['kk', 'ijazah'].map(doc => {
                                    const key = doc === 'kk' ? 'link_kartukeluarga' : 'link_ijazah';
                                    return (
                                        <div key={doc} className="p-4 border-2 border-dashed border-gray-200 rounded-2xl text-center relative hover:bg-gray-50 transition-colors">
                                            <p className="text-[10px] font-black text-gray-400 uppercase mb-2">{doc === 'kk' ? 'KARTU KELUARGA' : 'IJAZAH'}</p>
                                            {formData[key] ? (
                                                <div className="flex items-center justify-center gap-2 text-green-600 bg-green-50 p-2 rounded-xl text-xs font-bold">
                                                    <Icons.CheckCircle /> File Tersimpan 
                                                    <button onClick={()=>setFormData({...formData, [key]:null})} className="ml-2 text-red-500 hover:text-red-700 transition-colors"><Icons.Trash/></button>
                                                </div>
                                            ) : (
                                                <div>
                                                    <input type="file" accept="image/*" onChange={(e)=>handleFileChange(e, doc)} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" disabled={uploading[doc]} />
                                                    <div className={`p-2 rounded-xl flex flex-col items-center justify-center text-xs font-bold ${uploading[doc] ? 'text-blue-500 animate-pulse' : 'text-gray-500'}`}>
                                                        <Icons.Upload /> {uploading[doc] ? 'Mengunggah...' : 'Pilih Gambar'}
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    );
                                })}
                            </div>
                        )}
                    </div>

                  <div className="mt-8 flex gap-2">
                      {step > 1 && <button onClick={() => setStep(step-1)} className="p-4 bg-gray-100 rounded-2xl hover:bg-gray-200 transition-colors"><Icons.ChevronLeft/></button>}
