                      <button onClick={handleNext} className="flex-1 bg-blue-600 text-white rounded-2xl font-black text-sm shadow-md active:scale-95 transition-all">
                          {step < 4 ? 'LANJUT' : 'SIMPAN DATA'}
                      </button>
                  </div>
              </div>
          </div>
      );
    };

    // 6. Wali Dashboard
    const WaliDashboard = ({ currentUser, students, saveStudentToDB, setView, onOpenGallery, config, saveConfig, handleLogout, showAlert, showConfirm, setShowDataProcessor }) => {
        const myStudents = students.filter(s => String(s.kelas || '') === String(currentUser.target_kelas || '') && String(s.rombel || '') === String(currentUser.target_rombel || ''));
        const [resetTarget, setResetTarget] = useState(null);
        const [vCode, setVCode] = useState('');
        const [studentDetail, setStudentDetail] = useState(null);
        
        const [showDefaultCodeModal, setShowDefaultCodeModal] = useState(false);
        const [newDefaultCode, setNewDefaultCode] = useState('');
        const [showDefaultCode, setShowDefaultCode] = useState(false);
        const [copied, setCopied] = useState(false);
        
        const [isSearchOpen, setIsSearchOpen] = useState(false);
        const [filterInput, setFilterInput] = useState('');
        const [activeFilters, setActiveFilters] = useState([]);
        const [showWaliGuide, setShowWaliGuide] = useState(false);
        const [showVideoModal, setShowVideoModal] = useState(false); 
        const [openGuideSection, setOpenGuideSection] = useState(0); 

        const [showGallery, setShowGallery] = useState(false);
        
        const waliGuides = [
            {
                id: 0, title: "Memeriksa Status Siswa (Warna)", icon: <Icons.Eye />,
                content: (
                    <ul className="text-[11px] text-gray-600 space-y-2 list-disc pl-4">
                        <li><span className="font-bold text-blue-600">Biru (SIAP VERIFIKASI):</span> Siswa sudah mengisi 100% dan menunggu Anda mengunci datanya. <b>Prioritaskan baris ini!</b></li>
                        <li><span className="font-bold text-amber-500">Kuning (MINTA BUKA):</span> Siswa ingin memperbaiki data yang terlanjur digembok. Buka kuncinya agar mereka bisa edit.</li>
                        <li><span className="font-bold text-red-500">Merah (PERBAIKAN):</span> Siswa sedang dalam masa perbaikan file karena Anda tolak.</li>
                    </ul>
                )
            },
            {
                id: 1, title: "Cara Verifikasi Data Satuan", icon: <Icons.CheckCircle />,
                content: (
                    <p className="text-[11px] text-gray-600 leading-relaxed mb-2">Klik <b>Ikon Mata</b> pada siswa. Periksa foto KK & Ijazah.<br/>- Jika Jelas: Klik "Verifikasi (Kunci)".<br/>- Jika Buram: Klik ikon Tong Sampah untuk hapus foto, lalu klik "Tolak & Revisi" beserta alasannya.</p>
                )
            },
            {
                id: 2, title: "Cara Verifikasi Massal", icon: <Icons.Check />,
                content: (
                    <p className="text-[11px] text-gray-600 leading-relaxed">Jika yakin data banyak siswa sudah benar, klik tombol besar hijau <b>"Verifikasi Massal"</b> di atas layar untuk mengunci semua siswa yang sudah 100% sekaligus.</p>
                )
            },
            {
                id: 3, title: "Proses Data WhatsApp (Input Cepat)", icon: <Icons.ClipboardEdit />,
                content: (
                    <p className="text-[11px] text-gray-600 leading-relaxed">Jika orang tua mengirimkan biodata & foto via WA, jangan suruh mereka login. Anda cukup klik <b>Ikon Papan Ujian (Proses Data WA)</b> di atas, masukkan password Anda, lalu copy-paste data dari grup WA ke dalam form 1 halaman tersebut dengan cepat.</p>
                )
            },
            {
                id: 4, 
                title: "Siswa Lupa Sandi (Reset)", 
                icon: <Icons.Refresh />,
                content: (
                    <div className="space-y-3">
                        <p className="text-[11px] text-gray-600 leading-relaxed">Jika siswa lupa sandi, klik <b>Ikon Refresh (Kuning)</b> di sebelah namanya. Masukkan Password Wali Anda. Sandi siswa akan kembali ke Kode Default.</p>
                    </div>
                )
            },
            {
                id: 5, title: "Ubah Kode Default Kelas", icon: <Icons.Edit />,
                content: (
                    <p className="text-[11px] text-gray-600 leading-relaxed">Anda dapat mengubah sandi awal di atas dashboard (Ikon Pensil). Gunakan kata yang mudah seperti "MIPA1JAYA". Sandi ini dipakai siswa login pertama kali / setelah Anda meresetnya.</p>
                )
            }
        ];

        const addFilter = (val) => {
            const f = val.trim();
            if (f && !activeFilters.includes(f)) setActiveFilters([...activeFilters, f]);
            setFilterInput('');
        };
        const removeFilter = (val) => setActiveFilters(activeFilters.filter(x => x !== val));
        const resetFilters = () => { setActiveFilters([]); setFilterInput(''); };

        const filteredMyStudents = useMemo(() => {
            if (activeFilters.length === 0) return myStudents;
            return myStudents.filter(s => {
                return activeFilters.every(filter => {
                    const fLower = filter.toLowerCase();
                    if (fLower === 'selesai') return s.progres_persen === 100;
                    if (fLower === 'belum selesai') return s.progres_persen < 100 && s.is_active;
                    if (fLower === 'belum aktif') return !s.is_active;
                    if (fLower === 'perbaikan') return s.status_verifikasi === 'Perbaikan';
                    if (fLower === 'pengajuan buka kunci') return s.status_verifikasi === 'Pengajuan Buka Kunci';
                    if (fLower === 'siap verifikasi') return s.progres_persen === 100 && !s.is_locked && String(s.status_verifikasi).toLowerCase() === 'pending';
                    const matchName = String(s.nama || '').toLowerCase().includes(fLower);
                    const matchNisn = String(s.nisn || '').includes(fLower);
                    return matchName || matchNisn;
                });
            });
        }, [myStudents, activeFilters]);
        
        const classKey = `${currentUser.target_kelas}-${currentUser.target_rombel}`;
        const currentDefaultCode = config.defaultCodes?.[classKey] || '123456';

        const eligibleBatchCount = myStudents.filter(s => s.progres_persen === 100 && !s.is_locked && String(s.status_verifikasi).toLowerCase() === 'pending').length;
        const totalLengkap = myStudents.filter(s => s.progres_persen === 100).length;
        
        const handleBatchVerify = () => {
            const eligible = myStudents.filter(s => s.progres_persen === 100 && !s.is_locked && String(s.status_verifikasi).toLowerCase() === 'pending');
            if (eligible.length === 0) return showAlert("Tidak ada siswa dengan progres 100% yang berstatus Pending saat ini.", "Informasi");

            showConfirm(`Anda yakin ingin memverifikasi dan mengunci data ${eligible.length} siswa sekaligus secara otomatis?`, () => {
                eligible.forEach((s, index) => {
                    const updated = {...s, is_locked: true, status_verifikasi: 'Terverifikasi', catatan_perbaikan: ''};
                    setTimeout(() => saveStudentToDB(updated), index * 150);
                });
                showAlert(`${eligible.length} data siswa yang lengkap telah diverifikasi massal.`, "Proses Selesai");
            });
        };

        const handleCopyCode = () => {
            const textArea = document.createElement("textarea");
            textArea.value = currentDefaultCode;
            document.body.appendChild(textArea);
            textArea.select();
            try { document.execCommand('copy'); setCopied(true); setTimeout(() => setCopied(false), 2000); } catch (e) {}
            document.body.removeChild(textArea);
        };

        const handleReset = () => {
          if (String(vCode).trim() === String(currentUser.kode).trim()) {
            const updated = {...resetTarget, kode_akses: currentDefaultCode, is_active: false, is_locked: false, status_verifikasi: 'Pending', catatan_perbaikan: ''};
            saveStudentToDB(updated);
            showAlert(`Berhasil mereset kode akses untuk ${resetTarget.nama} kembali ke Default.`, "Reset Berhasil");
            setResetTarget(null);
            setVCode('');
          } else {
            showAlert("Kode akses Wali Kelas salah, aksi ditolak.", "Gagal Validasi");
          }
        };

        const toggleLock = (student) => {
            const newStatus = !student.is_locked;
            const statusVerif = newStatus ? 'Terverifikasi' : 'Pending';
            saveStudentToDB({...student, is_locked: newStatus, status_verifikasi: statusVerif, catatan_perbaikan: ''});
        };

        const handleVerifyFromProfile = () => {
            const newStatus = !studentDetail.is_locked;
            const statusVerif = newStatus ? 'Terverifikasi' : 'Pending';
            const updated = {...studentDetail, is_locked: newStatus, status_verifikasi: statusVerif, catatan_perbaikan: ''};
            saveStudentToDB(updated);
            setStudentDetail(updated);
            showAlert(`Data ${studentDetail.nama} berhasil ${newStatus ? 'dikunci dan diverifikasi' : 'dibuka kuncinya'}.`, "Sukses");
        };

        const handleRejectFromProfile = (note) => {
            if(!note.trim()) return showAlert("Catatan perbaikan wajib diisi jika menolak data siswa.", "Peringatan");
            const updated = {...studentDetail, is_locked: false, status_verifikasi: 'Perbaikan', catatan_perbaikan: note};
            saveStudentToDB(updated);
            setStudentDetail(updated); 
            showAlert(`Catatan perbaikan telah dikirim ke dashboard ${studentDetail.nama}.`, "Revisi Dikirim");
        };

        const handleDeleteFileFromProfile = (docKey) => {
            showConfirm("Anda yakin ingin menghapus dokumen ini? Progres siswa akan berkurang dan status akan kembali Pending.", () => {
                const updated = { ...studentDetail, [docKey]: '', is_locked: false, status_verifikasi: 'Pending' };
                updated.progres_persen = calculateProgress(updated);
                saveStudentToDB(updated);
                setStudentDetail(updated);
                showAlert("Dokumen berhasil dihapus.", "Sukses");
            });
        };

        const openGalleryForList = (nisn, type) => {
            onOpenGallery(filteredMyStudents, nisn, type);
        };

        if (studentDetail) {
            return (
                <div className="p-6 pb-24 animate-fadeIn pt-10">
                    <ProfileComponent 
                        data={studentDetail} 
                        onOpenGallery={openGalleryForList} 
                        onBack={() => setStudentDetail(null)} 
                        role={currentUser.role}
                        onVerify={handleVerifyFromProfile}
                        onReject={handleRejectFromProfile}
                        onDeleteFile={handleDeleteFileFromProfile}
                    />
                </div>
            );
        }

        return (
          <div className="p-6 animate-fadeIn pt-10 pb-24 relative">
            <div className="flex justify-between items-center mb-8">
                <div>
                    <h2 className="text-2xl font-black">Monitoring</h2>
                    <p className="text-[10px] font-bold text-blue-600 uppercase tracking-widest">Kelas {currentUser.target_kelas}-{currentUser.target_rombel}</p>
                </div>
                <div className="flex items-center gap-2">
                    {config.enableGallery !== false && (
                        <button onClick={() => setShowGallery(!showGallery)} className={`p-3 rounded-2xl transition-colors shadow-md ${showGallery ? 'bg-blue-600 text-white' : 'bg-blue-50 text-blue-600 hover:bg-blue-100'}`} title="Galeri Kelas">
                            <Icons.Image />
                        </button>
                    )}
                    {config.enableDataProcessor !== false && (
                        <button onClick={() => setShowDataProcessor(true)} className="p-3 bg-indigo-50 text-indigo-600 rounded-2xl hover:bg-indigo-100 transition-colors shadow-md" title="Proses Data WA">
                            <Icons.ClipboardEdit />
                        </button>
                    )}
                    <button onClick={() => setShowWaliGuide(true)} className="p-3 bg-gray-900 text-white rounded-2xl hover:bg-gray-800 transition-colors shadow-md" title="Panduan Wali Kelas">
                        <Icons.BookOpen />
                    </button>
                    <button onClick={handleLogout} className="p-3 bg-red-50 text-red-500 rounded-2xl hover:bg-red-100 transition-colors" title="Keluar">
                        <Icons.LogOut/>
                    </button>
                </div>
            </div>

            <div className="bg-blue-50/30 p-4 rounded-[2rem] border border-blue-100 shadow-sm flex items-center justify-between gap-2 mb-6">
                <div className="flex-1">
                    <p className="text-[10px] font-black text-blue-600 uppercase tracking-widest mb-2 pl-1">Kode Reset Default</p>
                    <div className="inline-block bg-white px-5 py-2.5 rounded-xl border border-blue-100 shadow-sm min-w-[140px] text-center">
                        <span className="text-sm font-black text-gray-800 tracking-[0.3em]">{showDefaultCode ? currentDefaultCode : '••••••'}</span>
                    </div>
                </div>
                <div className="flex items-center gap-1">
                    <button onClick={() => setShowDefaultCode(!showDefaultCode)} className="p-3 bg-white text-blue-500 hover:text-blue-700 hover:bg-blue-50 rounded-xl transition-colors shadow-sm border border-blue-100" title={showDefaultCode ? "Sembunyikan" : "Tampilkan"}>{showDefaultCode ? <Icons.EyeOff /> : <Icons.Eye />}</button>
                    <button onClick={handleCopyCode} className={`p-3 bg-white rounded-xl shadow-sm border transition-colors ${copied ? 'text-green-500 border-green-200' : 'border-blue-100 text-blue-500 hover:text-blue-700 hover:bg-blue-50'}`} title="Salin Kode">{copied ? <Icons.Check /> : <Icons.Copy />}</button>
                    <button onClick={() => { setNewDefaultCode(currentDefaultCode); setShowDefaultCodeModal(true); }} className="p-3 bg-white text-blue-500 hover:text-blue-700 hover:bg-blue-50 rounded-xl transition-colors shadow-sm border border-blue-100" title="Ubah Kode"><Icons.Edit /></button>
                </div>
            </div>

            <div className="grid grid-cols-3 gap-3 mb-8">
                <div className="bg-white p-4 rounded-[1.5rem] border shadow-sm text-center flex flex-col justify-center items-center">
                    <p className="text-2xl font-black text-gray-800">{myStudents.filter(s => s.is_active).length}</p>
                    <p className="text-[8px] font-black text-gray-400 uppercase mt-1 leading-tight">Siswa Aktif</p>
                </div>
                <div className="bg-white p-4 rounded-[1.5rem] border shadow-sm text-center flex flex-col justify-center items-center">
                    <p className="text-2xl font-black text-green-600">{totalLengkap}</p>
                    <p className="text-[8px] font-black text-gray-400 uppercase mt-1 leading-tight">Data Lengkap</p>
                </div>
                <div className="bg-blue-50 border-blue-200 p-4 rounded-[1.5rem] border shadow-sm text-center flex flex-col justify-center items-center">
                    <p className="text-2xl font-black text-blue-600">{eligibleBatchCount}</p>
                    <p className="text-[8px] font-black text-blue-500 uppercase mt-1 leading-tight">Siap Verif</p>
                </div>
            </div>

            {eligibleBatchCount > 0 && (
                <div className="mb-6 animate-fadeIn">
                    <button onClick={handleBatchVerify} className="w-full py-4 bg-green-500 text-white rounded-[2rem] font-black text-sm shadow-xl shadow-green-200 hover:bg-green-600 active:scale-95 transition-all flex items-center justify-center gap-2 border border-green-400">
                        <Icons.CheckCircle /> Verifikasi Massal ({eligibleBatchCount} Siswa)
                    </button>
                </div>
            )}

            <div className="bg-white rounded-[1.5rem] border border-gray-100 shadow-sm mb-6 overflow-hidden">
                <div className="p-5 flex justify-between items-center cursor-pointer select-none hover:bg-gray-50 transition-colors" onClick={() => setIsSearchOpen(!isSearchOpen)}>
                    <div className="flex items-center gap-3">
                        <span className="text-gray-400"><Icons.Search /></span>
                        <h4 className="text-[10px] font-black text-gray-600 uppercase tracking-widest m-0">Pencarian & Filter Data</h4>
                        {activeFilters.length > 0 && <span className="bg-blue-100 text-blue-600 text-[10px] font-bold px-2 py-0.5 rounded-lg">{activeFilters.length} Aktif</span>}
                    </div>
                    <div className={`text-gray-400 transition-transform duration-300 ${isSearchOpen ? 'rotate-180' : ''}`}><Icons.ChevronDown /></div>
                </div>

                {isSearchOpen && (
                    <div className="p-5 pt-0 border-t border-gray-100 animate-fadeIn">
                        <div className="pt-4">
                            <div className="flex flex-wrap items-center gap-2 mb-4 min-h-[30px]">
                                <span className="text-[10px] font-bold text-gray-400 uppercase mr-1">Filter Aktif:</span>
                                {activeFilters.length === 0 && <span className="text-xs text-gray-400 italic">Semua Data</span>}
                                {activeFilters.map(f => (
                                    <div key={f} className="bg-blue-50 border border-blue-200 text-blue-700 px-3 py-1.5 rounded-xl text-[10px] font-bold flex items-center gap-2 shadow-sm animate-fadeIn">
                                        <span>{f}</span><button onClick={() => removeFilter(f)} className="text-blue-400 hover:text-blue-600"><Icons.X size={12}/></button>
                                    </div>
                                ))}
                            </div>
                            <div className="flex gap-2 mb-4">
                                <div className="relative flex-1">
                                    <div className="absolute left-3 top-2.5 text-gray-400"><Icons.Search /></div>
                                    <input type="text" placeholder="Ketik kata kunci & Enter..." value={filterInput} onChange={(e) => setFilterInput(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && addFilter(filterInput)} className="w-full pl-10 pr-4 py-2.5 bg-gray-50 border border-gray-100 rounded-xl outline-none focus:border-blue-500 text-xs font-bold transition-colors" />
                                </div>
                                <button onClick={() => addFilter(filterInput)} className="px-4 bg-gray-900 text-white rounded-xl active:scale-95 transition-transform flex items-center justify-center shadow-md text-[10px] font-bold uppercase tracking-widest">Tambah</button>
                            </div>
                            <div className="flex flex-wrap items-center gap-2 pt-3 border-t border-gray-100">
                                <span className="text-[10px] font-bold text-gray-400 uppercase mr-1">Saran:</span>
                                {['Siap Verifikasi', 'Selesai', 'Belum Selesai', 'Belum Aktif', 'Perbaikan', 'Pengajuan Buka Kunci'].map(f => {
                                    if (activeFilters.includes(f)) return null;
                                    return <button key={f} onClick={() => addFilter(f)} className={`px-3 py-1.5 rounded-lg text-[10px] font-bold border transition-colors flex items-center gap-1 ${f === 'Siap Verifikasi' ? 'bg-blue-50 text-blue-600 border-blue-200' : 'bg-white text-gray-500 border-gray-200 hover:bg-gray-50'}`}><Icons.Plus size={10} /> {f}</button>
                                })}
                                {activeFilters.length > 0 && <button onClick={resetFilters} className="px-3 py-1.5 rounded-lg text-[10px] font-black text-red-500 hover:bg-red-50 transition-colors ml-auto border border-transparent">Reset Semua</button>}
                            </div>
                        </div>
                    </div>
                )}
            </div>

            {showGallery ? (
                <div className="grid grid-cols-2 gap-3 mt-4 animate-fadeIn">
                    {filteredMyStudents.map(s => (
                        <div key={s.nisn} className="bg-white p-3 rounded-2xl border border-gray-100 shadow-sm flex flex-col items-center relative">
                            <div className="absolute top-2 right-2 flex gap-1 z-10">
                                {s.is_locked ? (
                                    <div className="w-5 h-5 bg-green-100 text-green-600 border border-green-200 rounded-full flex items-center justify-center shadow-sm" title="Terverifikasi">
                                        <Icons.Check size={12}/>
                                    </div>
                                ) : s.status_verifikasi === 'Perbaikan' ? (
                                    <div className="w-5 h-5 bg-red-100 text-red-600 border border-red-200 rounded-full flex items-center justify-center shadow-sm" title="Butuh Perbaikan">
                                        <Icons.X size={12}/>
                                    </div>
                                ) : null}
                            </div>
                            
                            <p className="text-[10px] font-black text-gray-800 text-center mb-1 line-clamp-1 w-full">{s.nama}</p>
                            <p className="text-[8px] font-bold text-gray-400 mb-2">{s.nisn}</p>
                            
                            <div className="flex gap-2 w-full">
                                <div 
                                    className="flex-1 aspect-square bg-gray-50 rounded-xl overflow-hidden border border-gray-100 relative group cursor-pointer" 
                                    onClick={() => s.link_kartukeluarga && openGalleryForList(s.nisn, 'kk')}
                                >
                                    {s.link_kartukeluarga ? <img src={s.link_kartukeluarga} className="w-full h-full object-cover group-hover:scale-110 transition-transform" /> : <span className="absolute inset-0 flex items-center justify-center text-[8px] font-bold text-gray-300">NO KK</span>}
                                </div>
                                <div 
                                    className="flex-1 aspect-square bg-gray-50 rounded-xl overflow-hidden border border-gray-100 relative group cursor-pointer" 
                                    onClick={() => s.link_ijazah && openGalleryForList(s.nisn, 'ijazah')}
                                >
                                    {s.link_ijazah ? <img src={s.link_ijazah} className="w-full h-full object-cover group-hover:scale-110 transition-transform" /> : <span className="absolute inset-0 flex items-center justify-center text-[8px] font-bold text-gray-300">NO IJAZAH</span>}
                                </div>
                            </div>
                            <div className="w-full mt-3">
                                <button onClick={() => setStudentDetail(s)} className="w-full py-1.5 bg-gray-100 text-gray-600 rounded-lg text-[8px] font-bold uppercase tracking-widest hover:bg-gray-200">Buka Detail</button>
                            </div>
                        </div>
                    ))}
                    {filteredMyStudents.length === 0 && <p className="col-span-2 text-center text-gray-400 text-xs p-4">Belum ada data siswa yang sesuai.</p>}
                </div>
            ) : (
                <div className="space-y-4 animate-fadeIn">
                    {filteredMyStudents.map(s => {
                        const isReadyToVerify = s.progres_persen === 100 && !s.is_locked && String(s.status_verifikasi).toLowerCase() === 'pending';
                        
                        let cardClass = "bg-white border-gray-100 hover:border-blue-100"; 
                        if (s.status_verifikasi === 'Pengajuan Buka Kunci') cardClass = "border-amber-300 bg-amber-50/50";
                        else if (s.status_verifikasi === 'Perbaikan') cardClass = "border-red-200 bg-red-50/30";
                        else if (isReadyToVerify) cardClass = "border-blue-300 bg-blue-50/50 shadow-sm shadow-blue-100";

                        return (
                            <div key={s.nisn} className={`p-4 rounded-[2rem] border flex items-center justify-between gap-2 transition-all ${cardClass}`}>
                                <div className="flex-1">
                                    <h4 className="font-bold text-sm text-gray-800">
                                        {s.nama} 
                                        <span className={`ml-2 px-1.5 py-0.5 rounded text-[8px] font-black align-middle ${s.is_active ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-500'}`}>
                                            {s.is_active ? 'AKTIF' : 'BARU'}
                                        </span>
                                    </h4>
                                    <p className="text-[10px] text-gray-400 mt-0.5">
                                        {isReadyToVerify && <span className="text-blue-600 font-black flex items-center gap-1"><Icons.CheckCircle /> SIAP VERIFIKASI</span>}
                                        {s.status_verifikasi === 'Perbaikan' && <span className="text-red-500 font-bold">BUTUH PERBAIKAN</span>}
                                        {s.status_verifikasi === 'Pengajuan Buka Kunci' && <span className="text-amber-500 font-bold flex items-center gap-1"><Icons.Bell /> MINTA BUKA KUNCI</span>}
                                        {!isReadyToVerify && s.status_verifikasi !== 'Perbaikan' && s.status_verifikasi !== 'Pengajuan Buka Kunci' && s.status_verifikasi}
                                    </p>
                                </div>
                                <div className="flex gap-1">
                                    <button onClick={() => setStudentDetail(s)} className={`p-2 rounded-xl transition-colors ${s.status_verifikasi === 'Perbaikan' ? 'bg-red-100 text-red-600 hover:bg-red-200' : isReadyToVerify ? 'bg-blue-600 text-white hover:bg-blue-700 shadow-md shadow-blue-200' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`} title="Lihat Detail Siswa"><Icons.Eye/></button>
                                    <button onClick={() => toggleLock(s)} className={`p-2 rounded-xl transition-colors ${s.is_locked ? 'bg-green-600 text-white shadow-md shadow-green-200' : 'bg-gray-100 text-gray-400 hover:bg-gray-200'}`} title={s.is_locked ? "Buka Kunci Data" : "Kunci/Verifikasi Data"}>{s.is_locked ? <Icons.Lock/> : <Icons.Unlock/>}</button>
                                    <button onClick={() => setResetTarget(s)} className="p-2 bg-amber-50 text-amber-600 rounded-xl hover:bg-amber-100 transition-colors" title="Reset Password Siswa"><Icons.Refresh/></button>
                                </div>
                                <div className="text-right pl-3 border-l border-gray-200 ml-1 min-w-[45px]">
                                    <span className={`text-lg font-black ${s.progres_persen === 100 ? 'text-green-600' : 'text-blue-600'}`}>{s.progres_persen}%</span>
                                </div>
                            </div>
                        );
                    })}
                    {filteredMyStudents.length === 0 && <p className="text-center text-gray-400 text-xs p-4">Belum ada data siswa yang sesuai.</p>}
                </div>
            )}

            {/* MODAL RESET KODE (DIPINDAHKAN KE ATAS) */}
            {resetTarget && (
                <div className="fixed inset-0 z-[100] bg-black/40 backdrop-blur-sm flex items-start justify-center p-6 pt-24 animate-fadeIn">
                    <div className="bg-gradient-to-br from-orange-50 to-amber-50 p-8 rounded-[2.5rem] w-full max-w-xs shadow-2xl text-center border border-orange-100 animate-slideUp">
                        <div className="w-16 h-16 bg-white shadow-sm text-amber-500 rounded-full flex items-center justify-center mx-auto mb-4"><Icons.AlertTriangle /></div>
                        <h3 className="font-black text-lg mb-2">Verifikasi Reset</h3>
                        <p className="text-xs text-gray-700 mb-6">Masukkan Kode Wali untuk me-reset sandi <b>{resetTarget.nama}</b> menjadi <b>{currentDefaultCode}</b></p>
                        <input type="password" value={vCode} onChange={e => setVCode(e.target.value)} className="w-full p-4 bg-white/60 border border-orange-200 rounded-2xl mb-4 text-center font-bold tracking-widest outline-none focus:border-orange-400" placeholder="••••••" />
                        <div className="flex gap-2">
                            <button onClick={() => {setResetTarget(null); setVCode('');}} className="flex-1 py-3 bg-white/60 text-gray-700 border border-orange-100 rounded-xl font-bold text-xs uppercase tracking-widest hover:bg-white transition-colors">Batal</button>
                            <button onClick={handleReset} className="flex-1 py-3 bg-amber-500 text-white rounded-xl font-bold text-xs uppercase tracking-widest shadow-lg shadow-amber-200 active:scale-95 transition-all">Konfirmasi</button>
                        </div>
                    </div>
                </div>
            )}

            {/* MODAL GANTI KODE DEFAULT */}
            {showDefaultCodeModal && (
                <div className="fixed inset-0 z-50 bg-black/40 backdrop-blur-sm flex items-center justify-center p-6 animate-fadeIn">
                    <div className="bg-gradient-to-br from-orange-50 to-amber-50 p-8 rounded-[2.5rem] w-full max-w-xs shadow-2xl text-center border border-orange-100">
                        <div className="flex justify-between items-center mb-6">
                            <h3 className="font-black text-lg">Kode Default Kelas</h3>
                            <button onClick={() => setShowDefaultCodeModal(false)} className="text-gray-400 hover:text-gray-600 transition-colors"><Icons.X/></button>
                        </div>
                        <p className="text-xs text-gray-700 mb-6 text-left">Tentukan kode akses awal yang akan digunakan siswa kelas ini saat akun di-reset.</p>
                        <input type="text" value={newDefaultCode} onChange={e => setNewDefaultCode(e.target.value)} className="w-full p-4 bg-white/60 border border-orange-200 rounded-2xl mb-4 text-center font-bold tracking-widest outline-none focus:border-orange-400" placeholder={currentDefaultCode} />
                        <button onClick={() => {
                                if(newDefaultCode.length < 4) return showAlert("Kode minimal 4 karakter", "Peringatan");
                                const updatedConfig = { ...config, defaultCodes: { ...(config.defaultCodes || {}), [classKey]: newDefaultCode } };
                                saveConfig(updatedConfig); setShowDefaultCodeModal(false); setNewDefaultCode('');
                            }} 
                            className="w-full py-4 bg-blue-600 text-white rounded-xl font-bold text-xs uppercase tracking-widest shadow-lg active:scale-95 transition-all">
                            SIMPAN KODE
                        </button>
                    </div>
                </div>
            )}

            {/* MODAL PANDUAN WALI KELAS */}
            {showWaliGuide && (
                <div className="fixed inset-0 z-[60] bg-black/40 backdrop-blur-sm flex items-start justify-center p-6 pt-24 animate-fadeIn">
                    <div className="bg-white p-6 rounded-[2rem] w-full max-w-sm shadow-2xl relative flex flex-col max-h-[85vh]">
                        
                        {/* HEADER PANDUAN DENGAN TOMBOL EXIT */}
                        <div className="flex items-center justify-between mb-6 border-b pb-4">
                            <div className="flex items-center gap-3">
                                <div className="p-3 bg-gray-900 text-white rounded-xl"><Icons.BookOpen /></div>
                                <div>
                                    <h3 className="font-black text-lg text-gray-900 leading-tight">Panduan Wali</h3>
                                    <p className="text-[10px] text-gray-500 font-bold uppercase tracking-widest mt-1">Cara Penggunaan Dashboard</p>
                                </div>
                            </div>
                            <button onClick={() => setShowWaliGuide(false)} className="text-gray-400 hover:text-gray-600 bg-gray-100 p-2.5 rounded-xl transition-colors z-10">
                                <Icons.X size={18}/>
                            </button>
                        </div>
                        
                        {/* LIST PANDUAN DENGAN TOMBOL VIDEO DI KANAN */}
                        <div className="overflow-y-auto pr-2 space-y-2 flex-1 hide-scrollbar">
                            {waliGuides.map((guide) => (
                                <div key={guide.id} className="border border-gray-100 rounded-xl overflow-hidden transition-all">
                                    <div className={`w-full flex items-center justify-between transition-colors ${openGuideSection === guide.id ? 'bg-blue-50/50' : 'bg-white hover:bg-gray-50'}`}>
                                        
                                        <div 
                                            onClick={() => setOpenGuideSection(openGuideSection === guide.id ? null : guide.id)}
                                            className="flex-1 p-4 flex items-center gap-3 cursor-pointer select-none"
                                        >
                                            <div className={`text-gray-500 ${openGuideSection === guide.id ? 'text-blue-600' : ''}`}>
                                                {React.cloneElement(guide.icon, { size: 16 })}
                                            </div>
                                            <h4 className={`text-xs font-bold ${openGuideSection === guide.id ? 'text-blue-800' : 'text-gray-700'}`}>
                                                {guide.title}
                                            </h4>
                                        </div>

                                        <div className="flex items-center pr-4 gap-2">
                                            {guide.id === 4 && (
                                                <button 
                                                    onClick={(e) => { e.stopPropagation(); setShowVideoModal(true); }}
                                                    className="flex items-center gap-1.5 px-2.5 py-1 bg-indigo-100 text-indigo-600 rounded-lg hover:bg-indigo-200 transition-colors shadow-sm cursor-pointer z-20"
                                                    title="Video Tutorial"
                                                >
                                                    <Icons.PlayCircle size={14}/>
                                                    <span className="text-[9px] font-bold uppercase tracking-widest hidden sm:inline">Tutorial</span>
                                                </button>
                                            )}
                                            <div 
                                                onClick={() => setOpenGuideSection(openGuideSection === guide.id ? null : guide.id)}
                                                className={`text-gray-400 cursor-pointer p-1 transition-transform duration-300 ${openGuideSection === guide.id ? 'rotate-180 text-blue-500' : ''}`}
                                            >
                                                <Icons.ChevronDown size={16} />
                                            </div>
                                        </div>
                                    </div>
                                    {openGuideSection === guide.id && <div className="p-4 pt-1 bg-blue-50/50 animate-fadeIn">{guide.content}</div>}
                                </div>
                            ))}
                        </div>
                        
                        <div className="mt-4 pt-4 border-t border-gray-100">
                            <button onClick={() => setShowWaliGuide(false)} className="w-full py-4 bg-gray-900 text-white rounded-2xl font-black text-xs uppercase tracking-widest shadow-lg active:scale-95 transition-all">Tutup Panduan</button>
                        </div>
                    </div>
                </div>
            )}

            {/* MODAL VIDEO TUTORIAL RESET */}
            {showVideoModal && (
                <div className="fixed inset-0 z-[70] bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 sm:p-6 animate-fadeIn">
                    <div className="bg-white p-5 sm:p-6 rounded-[2rem] w-full max-w-md shadow-2xl relative flex flex-col">
                        <button onClick={() => setShowVideoModal(false)} className="absolute top-4 right-4 text-gray-400 hover:text-gray-600 bg-gray-100 p-2 rounded-full transition-colors z-20"><Icons.X/></button>
                        
                        <div className="flex items-center gap-3 mb-5 border-b border-gray-100 pb-4">
                            <div className="p-3 bg-indigo-600 text-white rounded-xl"><Icons.PlayCircle /></div>
                            <div>
                                <h3 className="font-black text-lg text-gray-900 leading-tight">Tutorial Reset</h3>
                                <p className="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Video Panduan Praktis</p>
                            </div>
                        </div>
                        
                        <div className="w-full bg-gray-100 rounded-2xl overflow-hidden aspect-[9/16] max-h-[65vh] relative flex items-center justify-center mb-4 shadow-inner">
                            <iframe src="https://drive.google.com/file/d/14IR1hpxJANdbgIPKaDXRwTrO3bFIwE7-/preview" className="absolute inset-0 w-full h-full border-0" allow="autoplay; fullscreen" title="Tutorial Reset Password"></iframe>
                        </div>

                        <div className="bg-indigo-50/50 p-4 rounded-2xl border border-indigo-100 mt-2">
                            <p className="text-[11px] text-indigo-800 leading-relaxed font-medium">
                                <b className="text-indigo-600">Langkah Singkat:</b> Klik ikon <b className="text-amber-500">Kuning (Refresh)</b> ➔ Masukkan Password Anda ➔ Konfirmasi.
                            </p>
                        </div>
                    </div>
                </div>
            )}
          </div>
        );
    };

    const AdminPanel = ({ currentUser, config, setConfig, students, teachers, setTeachers, saveStudentToDB, setView, onOpenGallery, saveConfig, handleLogout, showAlert, showConfirm, setShowDataProcessor }) => {
        const isSuperAdmin = currentUser?.role === 'super_admin' || currentUser?.role === 'admin';
        
        const [tab, setTab] = useState(isSuperAdmin ? 'sys' : 'student');
        const [openAccordion, setOpenAccordion] = useState(null);
        const [openProgressAccordion, setOpenProgressAccordion] = useState(null);
        
        const [nCls, setNCls] = useState('');
        const [nRmb, setNRmb] = useState('');

        const [editingTeacher, setEditingTeacher] = useState(null);

        const [adminUsers, setAdminUsers] = useState([]);
        const [editingAdmin, setEditingAdmin] = useState(null);

        const [isAdminSearchOpen, setIsAdminSearchOpen] = useState(false);
        const [filterInput, setFilterInput] = useState('');
        const [activeFilters, setActiveFilters] = useState([]);
        const [filterKelas, setFilterKelas] = useState('');
        const [filterRombel, setFilterRombel] = useState('');
        const [adminStudentDetail, setAdminStudentDetail] = useState(null);

        const [showGallery, setShowGallery] = useState(false);

        const addFilter = (val) => {
            const f = val.trim();
            if (f && !activeFilters.includes(f)) setActiveFilters([...activeFilters, f]);
            setFilterInput('');
        };
        const removeFilter = (val) => setActiveFilters(activeFilters.filter(x => x !== val));
        const resetFilters = () => { setActiveFilters([]); setFilterInput(''); setFilterKelas(''); setFilterRombel(''); };

        useEffect(() => {
            if (tab === 'admins' && isSuperAdmin) {
                if (typeof google !== 'undefined') {
                    google.script.run.withSuccessHandler(res => {
                        try { setAdminUsers(JSON.parse(res)); } catch(e){}
                    }).getAdminUsers();
                } else {
                    setAdminUsers([]);
                }
            }
        }, [tab]);

        const handleSaveAdmin = (e) => {
            e.preventDefault();
            const fd = new FormData(e.target);
            const newUsername = fd.get('username').trim();
            
            if (editingAdmin.isNew && adminUsers.some(a => a.username === newUsername)) {
                return showAlert("Username sudah dipakai!", "Gagal");
            }

            const updatedAdmin = { ...editingAdmin, username: newUsername, password: fd.get('password'), role: fd.get('role'), nama_pengguna: fd.get('nama_pengguna') };
            
            if (editingAdmin.isNew) setAdminUsers(prev => [...prev, updatedAdmin]);
            else setAdminUsers(prev => prev.map(a => a.username === updatedAdmin.username ? updatedAdmin : a));
            
            setEditingAdmin(null);
            
            if (typeof google !== 'undefined') {
                google.script.run.withFailureHandler(err => showAlert(err.message, "Error")).updateAdminUser(updatedAdmin, false);
            }
            showAlert("Akun akses berhasil disimpan.", "Sukses");
        };

        const handleDeleteAdmin = (adminObj) => {
            if (adminObj.username === currentUser.identity || adminObj.username === 'admin') {
                return showAlert("Anda tidak bisa menghapus akun Anda sendiri atau akun root utama.", "Ditolak");
            }
            showConfirm(`Hapus akses untuk ${adminObj.nama_pengguna} (@${adminObj.username})?`, () => {
                setAdminUsers(prev => prev.filter(a => a.username !== adminObj.username));
                if (typeof google !== 'undefined') {
                    google.script.run.updateAdminUser(adminObj, true);
                }
                showAlert("Akun akses berhasil dihapus.", "Dihapus");
            });
        };

        const handleSaveTeacher = (e) => {
            e.preventDefault();
            const fd = new FormData(e.target);
            const newUsername = fd.get('username').trim();

            if (editingTeacher.isNew && teachers.some(t => normalizeId(t.username) === normalizeId(newUsername))) {
                showAlert("Username sudah terdaftar! Harap gunakan ID login lain.", "Gagal Menyimpan");
                return;
            }

            const updatedTeacher = { ...editingTeacher, nama: fd.get('nama'), username: newUsername, target_kelas: fd.get('target_kelas'), target_rombel: fd.get('target_rombel') };

            if (editingTeacher.isNew) setTeachers(prev => [...prev, updatedTeacher]);
            else setTeachers(prev => prev.map(t => t.username === editingTeacher.username ? updatedTeacher : t));
            
            setEditingTeacher(null);
            
            if (typeof google !== 'undefined') {
                google.script.run
                .withFailureHandler(err => showAlert("Gagal menyimpan Wali Kelas ke database: " + err.message, "Kesalahan Sistem"))
                .updateTeacherData(updatedTeacher);
            }
            showAlert(`Data Wali Kelas berhasil ${editingTeacher.isNew ? 'ditambahkan' : 'diperbarui'}.`, "Sukses");
        };

        const filteredAdminStudents = useMemo(() => {
            return students.filter(s => {
                const matchKelas = filterKelas ? String(s.kelas || '') === String(filterKelas) : true;
                const matchRombel = filterRombel ? String(s.rombel || '') === String(filterRombel) : true;
                if (!matchKelas || !matchRombel) return false;
                if (activeFilters.length === 0) return true;
                return activeFilters.every(filter => {
                    const fLower = filter.toLowerCase();
                    if (fLower === 'selesai') return s.progres_persen === 100;
                    if (fLower === 'belum selesai') return s.progres_persen < 100 && s.is_active;
                    if (fLower === 'belum aktif') return !s.is_active;
                    if (fLower === 'perbaikan') return s.status_verifikasi === 'Perbaikan';
                    if (fLower === 'pengajuan buka kunci') return s.status_verifikasi === 'Pengajuan Buka Kunci';
                    if (fLower === 'siap verifikasi') return s.progres_persen === 100 && !s.is_locked && String(s.status_verifikasi).toLowerCase() === 'pending';
                    const matchName = String(s.nama || '').toLowerCase().includes(fLower);
                    const matchNisn = String(s.nisn || '').includes(fLower);
                    const matchWA = String(s.wa_siswa || '').includes(fLower) || String(s.wa_ayah || '').includes(fLower) || String(s.wa_ibu || '').includes(fLower);
                    const matchParent = String(s.nama_ayah || '').toLowerCase().includes(fLower) || String(s.nama_ibu || '').toLowerCase().includes(fLower);
                    return matchName || matchNisn || matchWA || matchParent;
                });
            });
        }, [students, activeFilters, filterKelas, filterRombel]);

        const handleAdminStudentToggleLock = (s) => {
            const newStatus = !s.is_locked;
            const statusVerif = newStatus ? 'Terverifikasi' : 'Pending';
            saveStudentToDB({...s, is_locked: newStatus, status_verifikasi: statusVerif, catatan_perbaikan: ''});
        };

        const handleAdminStudentReset = (s) => {
            showConfirm(`Anda yakin ingin mereset password dan membuka kunci data milik ${s.nama}?`, () => {
                const classKey = `${s.kelas}-${s.rombel}`;
                const currentDefaultCode = config.defaultCodes?.[classKey] || '123456';
                saveStudentToDB({...s, kode_akses: currentDefaultCode, is_active: false, is_locked: false, status_verifikasi: 'Pending', catatan_perbaikan: ''});
                showAlert("Data siswa berhasil dikembalikan ke status awal.", "Reset Berhasil");
            });
        };

        const handleVerifyFromAdmin = () => {
            const newStatus = !adminStudentDetail.is_locked;
            const statusVerif = newStatus ? 'Terverifikasi' : 'Pending';
            const updated = {...adminStudentDetail, is_locked: newStatus, status_verifikasi: statusVerif, catatan_perbaikan: ''};
            saveStudentToDB(updated);
            setAdminStudentDetail(updated);
            showAlert(`Data ${adminStudentDetail.nama} berhasil ${newStatus ? 'dikunci dan diverifikasi' : 'dibuka kuncinya'}.`, "Sukses");
        };

        const handleRejectFromAdmin = (note) => {
            if(!note.trim()) return showAlert("Catatan perbaikan wajib diisi jika menolak data siswa.", "Peringatan");
            const updated = {...adminStudentDetail, is_locked: false, status_verifikasi: 'Perbaikan', catatan_perbaikan: note};
            saveStudentToDB(updated);
            setAdminStudentDetail(updated);
            showAlert(`Catatan perbaikan telah dikirim ke dashboard ${adminStudentDetail.nama}.`, "Revisi Dikirim");
        };

        const handleDeleteFileFromAdmin = (docKey) => {
            showConfirm("Anda yakin ingin menghapus dokumen ini? Progres siswa akan berkurang dan status akan kembali Pending.", () => {
                const updated = { ...adminStudentDetail, [docKey]: '', is_locked: false, status_verifikasi: 'Pending' };
                updated.progres_persen = calculateProgress(updated);
                saveStudentToDB(updated);
                setAdminStudentDetail(updated);
                showAlert("Dokumen berhasil dihapus.", "Sukses");
            });
        };

        const exportToCSV = () => {
            if(filteredAdminStudents.length === 0) return showAlert("Tidak ada data untuk diekspor", "Informasi");
            const headers = ['NISN', 'Nama Lengkap', 'Kelas', 'Rombel', 'Status Verifikasi', 'Progres (%)', 'No. WA', 'Status Ayah', 'Status Ibu'];
            const csvRows = [headers.join(',')];
            filteredAdminStudents.forEach(s => {
                const row = [ `"${s.nisn}"`, `"${s.nama}"`, `"${s.kelas}"`, `"${s.rombel}"`, `"${s.status_verifikasi}"`, `"${s.progres_persen}"`, `"${s.wa_siswa || ''}"`, `"${s.status_ayah || ''}"`, `"${s.status_ibu || ''}"` ];
                csvRows.push(row.join(','));
            });
            const blob = new Blob([csvRows.join('\n')], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `Data_Siswa_${new Date().toISOString().split('T')[0]}.csv`;
            link.click();
        };

        const exportToPDF = () => {
            if(filteredAdminStudents.length === 0) return showAlert("Tidak ada data untuk dicetak", "Informasi");
            const printWindow = window.open('', '_blank');
            printWindow.document.write(`
                <html><head><title>Rekap Data Siswa</title><style>body { font-family: Arial, sans-serif; padding: 20px; } h2 { text-align: center; } table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 12px; } th, td { border: 1px solid #ddd; padding: 8px; text-align: left; } th { background-color: #f2f2f2; }</style></head>
                <body><h2>Rekapitulasi Data Siswa</h2><p style="font-size:12px; color:#555;">Waktu Cetak: ${new Date().toLocaleString('id-ID')}</p>
                <table><thead><tr><th>No</th><th>NISN</th><th>Nama Lengkap</th><th>Kelas</th><th>Rombel</th><th>Status</th><th>Progres</th></tr></thead>
                <tbody>${filteredAdminStudents.map((s, i) => `<tr><td>${i + 1}</td><td>${s.nisn}</td><td>${s.nama}</td><td>${s.kelas}</td><td>${s.rombel}</td><td>${s.status_verifikasi}</td><td>${s.progres_persen}%</td></tr>`).join('')}</tbody></table>
                <scr`+`ipt>window.onload = function() { window.print(); window.close(); }</scr`+`ipt></body></html>
            `);
            printWindow.document.close();
        };

        const openGalleryForList = (nisn, type) => {
            onOpenGallery(filteredAdminStudents, nisn, type);
        };
        
        if (adminStudentDetail) {
            return (
                <div className="p-6 pb-24 animate-fadeIn pt-10">
                    <ProfileComponent 
                        data={adminStudentDetail} 
                        onOpenGallery={openGalleryForList}
                        onBack={() => setAdminStudentDetail(null)} 
                        role={currentUser.role}
                        onVerify={handleVerifyFromAdmin}
                        onReject={handleRejectFromAdmin}
                        onDeleteFile={handleDeleteFileFromAdmin}
                    />
                </div>
            );
        }

        return (
          <div className="p-6 animate-fadeIn pb-24 pt-10">
            <div className="flex justify-between items-center mb-8">
                <h2 className="text-2xl font-black">{isSuperAdmin ? 'SUPER ADMIN' : 'ADMIN PANTAU'}</h2>
                <div className="flex gap-2">
                    {config.enableGallery !== false && (
